<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIMPROMEBEL | Exclusive Design</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #f2c94c;
            --dark: #0d0d0f;
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            height: 100%; width: 100%; 
            background: var(--dark); 
            font-family: 'Montserrat', sans-serif; 
            color: white; 
            overflow-x: hidden;
        }

        /* ГЛАВНЫЙ ЭКРАН */
        .hero {
            height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            position: relative;
            padding: 0 8%;
        }

        /* ФОНОВАЯ КАРТИНКА */
        .hero-bg {
            position: absolute;
            top: 0; right: 0;
            width: 70%; /* Картинка занимает часть экрана справа, как в премиум-дизайне */
            height: 100%;
            background-image: url('https://github.com/user-attachments/assets/7162f987-ebc5-4a1c-808b-ffa029dc14d5');
            background-size: cover;
            background-position: center;
            z-index: 1;
        }

        /* СЛОЖНЫЙ ГЛЯНЦЕВЫЙ ГРАДИЕНТ */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, 
                var(--dark) 30%, 
                rgba(13, 13, 15, 0.8) 50%, 
                rgba(13, 13, 15, 0.1) 100%
            );
            z-index: 2;
        }

        /* КОНТЕНТ */
        .content {
            position: relative;
            z-index: 10;
            max-width: 800px;
        }

        .step-num {
            font-size: 14px;
            letter-spacing: 5px;
            color: var(--gold);
            margin-bottom: 20px;
            display: block;
            font-weight: 700;
        }

        h1 {
            font-size: clamp(40px, 8vw, 90px);
            font-weight: 200; /* Тонкое начертание для стиля */
            line-height: 1;
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        h1 b {
            font-weight: 900; /* Жирный акцент */
            display: block;
        }

        h1 span {
            color: var(--gold);
        }

        .description {
            font-size: 18px;
            font-weight: 400;
            line-height: 1.8;
            color: rgba(255,255,255,0.6);
            max-width: 500px;
            margin-bottom: 50px;
            border-left: 1px solid var(--gold);
            padding-left: 30px;
        }

        /* КНОПКА В СТИЛЕ IMPULSE */
        .cta-box {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .btn {
            padding: 25px 60px;
            border: 1px solid var(--gold);
            color: white;
            text-decoration: none;
            text-transform: uppercase;
            font-weight: 700;
            font-size: 13px;
            letter-spacing: 2px;
            transition: 0.4s;
            position: relative;
            background: rgba(242, 201, 76, 0.1);
        }

        .btn:hover {
            background: var(--gold);
            color: black;
            transform: translateY(-5px);
        }

        /* ЛОГОТИП */
        header {
            position: absolute;
            top: 50px; left: 8%;
            z-index: 100;
            width: 84%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-weight: 900;
            font-size: 20px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .logo span { color: var(--gold); }

        .nav-dots {
            position: absolute;
            right: 50px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .dot {
            width: 8px; height: 8px;
            border: 1px solid var(--gold);
            border-radius: 50%;
        }

        .dot.active { background: var(--gold); }

    </style>
</head>
<body>

    <header>
        <div class="logo">KIM<span>PRO</span>MEBEL</div>
        <div style="font-size: 12px; letter-spacing: 2px; font-weight: 700; opacity: 0.5;">DESIGN & ENGINEERING</div>
    </header>

    <div class="nav-dots">
        <div class="dot active"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    </div>

    <section class="hero">
        <div class="hero-bg"></div>
        <div class="overlay"></div>
        
        <div class="content">
            <span class="step-num">01 / CONCEPT</span>
            <h1>Эксклюзивные <b>КУХНИ</b> <span>PRO</span> уровня</h1>
            
            <div class="description">
                Индивидуальное проектирование и деталировка мебели. 
                Мы создаем не просто чертежи, а фундамент вашего идеального пространства.
            </div>

            <div class="cta-box">
                <a href="https://t.me/kimpromebel_pro" target="_blank" class="btn">Обсудить проект</a>
            </div>
        </div>
    </section>

</body>
</html>
