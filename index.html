<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KIMPROMEBEL | Exclusive Design</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #f2c94c;
            --dark: #0d0d0f;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            min-height: 100%; width: 100%; 
            background: var(--dark); 
            font-family: 'Montserrat', sans-serif; 
            color: white; 
            overflow-x: hidden;
        }

        .hero {
            height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            position: relative;
            padding: 0 8%;
        }

        .hero-bg {
            position: absolute;
            top: 0; right: 0;
            width: 80%; height: 100%;
            background-image: url('https://github.com/user-attachments/assets/7162f987-ebc5-4a1c-808b-ffa029dc14d5');
            background-size: cover; background-position: center;
            z-index: 1;
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, rgba(13,13,15,0.98) 15%, rgba(13,13,15,0.6) 50%, rgba(13,13,15,0.2) 100%);
            z-index: 2;
        }

        .content { position: relative; z-index: 10; max-width: 900px; width: 100%; animation: fadeInUp 1s ease-out forwards; }

        h1 {
            font-size: clamp(38px, 7vw, 95px);
            font-weight: 200; line-height: 1;
            text-transform: uppercase; margin-bottom: 25px;
        }
        h1 b { font-weight: 900; display: block; }
        h1 span { color: var(--gold); }

        .description {
            font-size: clamp(17px, 1.8vw, 21px);
            font-weight: 400; line-height: 1.6;
            color: rgba(255,255,255,0.85);
            max-width: 550px; margin-bottom: 40px;
            border-left: 3px solid var(--gold); padding-left: 20px;
        }

        .btn {
            padding: 20px 50px;
            border: 1px solid var(--gold);
            color: white; text-decoration: none;
            text-transform: uppercase; font-weight: 700;
            font-size: 13px; letter-spacing: 2px;
            transition: 0.3s; background: rgba(242, 201, 76, 0.1);
            display: inline-block;
        }
        .btn:hover { background: var(--gold); color: black; }

        /* HEADER & PHONE */
        header { position: absolute; top: 35px; left: 8%; z-index: 100; }
        .logo { font-weight: 900; font-size: 22px; letter-spacing: 1px; }
        .logo span { color: var(--gold); }

        .phone-block {
            position: absolute; top: 35px; right: 8%;
            z-index: 100; display: flex; align-items: center; gap: 12px;
            text-decoration: none; color: white;
        }
        .phone-icon {
            width: 44px; height: 44px; border: 2px solid var(--gold); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: var(--gold); background: rgba(13, 13, 15, 0.6);
            box-shadow: 0 0 15px rgba(242, 201, 76, 0.3);
        }

        /* ========================================================
           --- ТРЁХУРОВНЕВАЯ СТРАТЕГИЯ АДАПТАЦИИ ЭТАПОВ ---
           ======================================================== */

        /* --- 1. БОЛЬШОЙ МОНИТОР (ПК) --- */
        .steps-bar {
            position: absolute;
            bottom: 40px; /* Привязка к самому низу экрана */
            left: 50%;
            transform: translateX(-50%); /* Горизонтальное центрирование относительно окна */
            display: flex;
            justify-content: center;
            gap: 60px;
            z-index: 20;
            width: 90%; /* Предотвращает переполнение */
            animation: fadeInUp 1.3s ease-out forwards;
        }

        .step-item { display: flex; align-items: center; gap: 12px; }
        .dot-marker { 
            width: 10px; height: 10px; 
            background-color: var(--gold); border-radius: 50%; 
            box-shadow: 0 0 10px var(--gold);
        }
        
        .step-text { 
            font-size: 18px; /* Как в описании */
            font-weight: 400; /* Как в описании */
            text-transform: uppercase; letter-spacing: 1px; color: #fff;
            white-space: nowrap;
        }

        /* --- 2. УСЛОВИЯ ДЛЯ ПЛАНШЕТОВ (до 1024px) --- */
        @media (max-width: 1024px) {
            .hero { padding: 0 5%; }
            header, .phone-block { top: 25px; left: 5%; }
            .phone-block { right: 5%; left: auto; }
            .phone-number { display: none; } /* Оставляем только иконку */

            h1 { font-size: clamp(32px, 8vw, 50px); }
            
            /* Адаптивный сжатый футер для планшета */
            .steps-bar { gap: 30px; bottom: 30px; }
            .step-text { font-size: 15px; }
        }

        /* --- 3. УСЛОВИЯ ДЛЯ СМАРТФОНОВ (до 768px) --- */
        @media (max-width: 768px) {
            .hero { padding: 120px 6% 40px; align-items: flex-start; height: auto; min-height: 100vh; }
            .hero-bg { width: 100%; opacity: 0.5; }
            .overlay { background: rgba(13, 13, 15, 0.85); }
            
            .content { display: flex; flex-direction: column; align-items: center; text-align: center; }
            
            header { left: 6%; top: 20px; }
            .logo { font-size: 19px; }
            .phone-block { top: 20px; right: 6%; }
            .phone-icon { width: 38px; height: 38px; }

            h1 { font-size: 38px; margin-bottom: 20px; }
            .description { border-left: none; padding-left: 0; margin-bottom: 30px; font-size: 17px; }
            .btn { width: 100%; max-width: 300px; }
            
            /* ПОЛНЫЙ ФИКС ДЛЯ МОБИЛЬНЫХ ЭТАПОВ */
            .steps-bar { 
                position: relative; /* Перенос в контент под кнопку */
                bottom: auto; left: auto; transform: none;
                margin-top: 50px; /* Отступ от кнопки */
                flex-direction: column; 
                align-items: center; /* Центрирование всего списка */
                gap: 15px; 
                width: 100%;
                padding: 0;
            }
            .step-item { justify-content: center; width: 100%; } /* Идеальное центрирование пары точка+текст */
            .step-text { white-space: normal; text-align: center; font-size: 16px; width: fit-content; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">KIM<span>PRO</span>MEBEL</div>
    </header>

    <a href="tel:+380675867998" class="phone-block">
        <div class="phone-icon">📞</div>
        <div class="phone-number"><span>(+38)</span> 067 586 79 98</div>
    </a>

    <section class="hero">
        <div class="hero-bg"></div>
        <div class="overlay"></div>
        
        <div class="content">
            <h1>Эксклюзивные <b>КУХНИ</b> <span>PRO</span> уровня</h1>
            <div class="description">
                Индивидуальное проектирование и деталировка. 
                Создаем техническую базу для безупречного производства.
            </div>
            
            <a href="https://t.me/mihailkuvila" target="_blank" class="btn">Заказать проект</a>

            <div class="steps-bar mobile-only">
                <div class="step-item"><div class="dot-marker"></div><span class="step-text">создаем 3д проект</span></div>
                <div class="step-item"><div class="dot-marker"></div><span class="step-text">готовим тех. часть</span></div>
                <div class="step-item"><div class="dot-marker"></div><span class="step-text">отправляем в цех</span></div>
            </div>
        </div>
    </section>

</body>
</html>
