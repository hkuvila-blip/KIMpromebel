<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KIMPROMEBEL | Exclusive Design (V6.1)</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;200;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/css/intlTelInput.css">

    <style>
        :root {
            --gold: #f2c94c;
            --pure-black: #0d0d0f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { 
            width: 100%; background: #000; 
            font-family: 'Montserrat', sans-serif; color: white; 
            overflow-x: hidden; min-height: 100vh;
        }

        /* --- BACKGROUND & LAYOUT (Кратко для работы кода) --- */
        .hero { min-height: 100vh; width: 100%; display: flex; flex-direction: column; position: relative; padding: 40px 8%; justify-content: space-between; }
        .hero-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: url('https://github.com/user-attachments/assets/7162f987-ebc5-4a1c-808b-ffa029dc14d5'); background-size: cover; background-position: center; z-index: 1; opacity: 0.9; transform: scaleX(-1); }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(90deg, rgba(13,13,15,1) 0%, rgba(13,13,15,0.9) 20%, rgba(13,13,15,0.6) 50%, rgba(13,13,15,0.3) 100%); z-index: 2; }
        .top-nav { position: relative; display: flex; justify-content: space-between; align-items: center; z-index: 100; width: 100%; }
        .logo { font-weight: 900; font-size: 24px; text-transform: uppercase; letter-spacing: 1.5px; }
        .logo span { color: var(--gold); }
        .content { position: relative; z-index: 10; display: flex; justify-content: space-between; align-items: center; width: 100%; margin: auto 0; padding: 40px 0; }
        
        /* ТАЙМЕР */
        .timer-wrapper { display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .timer-container { position: relative; width: 280px; height: 280px; }
        .timer-svg { transform: rotate(-90deg); width: 100%; height: 100%; }
        .timer-progress { fill: none; stroke: var(--gold); stroke-width: 1; transition: stroke-dashoffset 1s linear; }
        .timer-number { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 100px; font-weight: 100; color: var(--gold); }

        /* --- ИСПРАВЛЕННАЯ ФОРМА (MODAL) --- */
        .modal { 
            display: none; position: fixed; z-index: 9999; 
            left: 0; top: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); 
        }

        .modal-content { 
            background: #0d0d0f; 
            border: 1px solid var(--gold); 
            margin: 15vh auto; 
            padding: 40px 30px; 
            width: 90%; 
            max-width: 420px; 
            text-align: center; 
            position: relative;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        .modal-title { 
            color: white; 
            text-transform: uppercase; 
            font-size: 18px; 
            margin-bottom: 25px; 
            letter-spacing: 1px;
            font-weight: 700;
        }
        .modal-title span { display: block; color: var(--gold); margin-top: 5px; }

        /* Общие стили для инпутов и кнопки */
        .modal-input, .iti { 
            width: 100% !important; 
            margin-bottom: 15px; 
        }

        .modal-input, .iti input {
            height: 55px !important;
            background: transparent !important;
            border: 1px solid rgba(242, 201, 76, 0.4) !important;
            color: #fff !important;
            font-size: 16px !important;
            font-family: 'Montserrat', sans-serif !important;
            padding: 0 15px !important;
            border-radius: 0 !important; /* Ровные углы как на фото */
        }

        /* ИСПРАВЛЕНИЕ: Отступ для цифр телефона, чтобы не перекрывали код */
        .iti--separate-dial-code input {
            padding-left: 95px !important; /* Увеличенный отступ под флаг и код */
        }

        .modal-btn { 
            width: 100%; 
            height: 55px;
            background: var(--gold); 
            border: none; 
            color: #000;
            font-weight: 900; 
            font-size: 18px; 
            cursor: pointer; 
            text-transform: uppercase; /* Заглавные буквы */
            letter-spacing: 2px;
            transition: 0.3s;
        }
        .modal-btn:hover { background: #fff; }

        .close-modal { 
            position: absolute; top: 10px; right: 15px; 
            font-size: 28px; color: var(--gold); cursor: pointer; 
        }

        /* Кастомизация списка стран (чтобы текст был виден) */
        .iti__country-list { background: #1a1a1a; border: 1px solid var(--gold); color: white; }
        .iti__country.iti__highlight { background: var(--gold); color: #000; }
    </style>
</head>
<body>

    <section class="hero">
        <div class="hero-bg"></div>
        <div class="overlay"></div>
        
        <nav class="top-nav">
            <div class="logo">KIM<span>PRO</span>MEBEL</div>
        </nav>

        <div class="content">
            <h1 style="max-width: 600px; font-size: 50px;">ЭКСКЛЮЗИВНЫЕ КУХНИ <b>PRO</b> УРОВНЯ</h1>
            
            <div id="timer-wrapper" class="timer-wrapper">
                <div class="timer-container">
                    <svg class="timer-svg" viewBox="0 0 100 100">
                        <circle id="progress-line" class="timer-progress" cx="50" cy="50" r="45"></circle>
                    </svg>
                    <div id="timer-num" class="timer-number">5</div>
                </div>
                <p style="color:var(--gold); text-transform:uppercase;">Оставь заявку — получи скидку</p>
            </div>
        </div>
    </section>

    <div id="callback-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <div class="modal-title">
                Введите имя и телефон.
                <span>Мы свяжемся с вами</span>
            </div>
            
            <input type="text" class="modal-input" placeholder="Имя">
            
            <div class="iti">
                <input type="tel" id="phone">
            </div>
            
            <button class="modal-btn">ОТПРАВИТЬ</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/js/intlTelInput.min.js"></script>
    <script>
        // Инициализация телефона
        const phoneInput = document.querySelector("#phone");
        window.intlTelInput(phoneInput, {
            initialCountry: "ua",
            separateDialCode: true,
            preferredCountries: ["ua", "pl", "de"],
            utilsScript: "https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/js/utils.js"
        });

        const timerNum = document.getElementById('timer-num');
        const progressLine = document.getElementById('progress-line');
        const totalTime = 5;
        let timeLeft = totalTime;
        const circumference = 2 * Math.PI * 45;

        progressLine.style.strokeDasharray = circumference;
        progressLine.style.strokeDashoffset = 0;

        function openModal() { document.getElementById('callback-modal').style.display = 'block'; }
        function closeModal() { document.getElementById('callback-modal').style.display = 'none'; }

        // Запуск через 1 сек
        setTimeout(() => {
            const countdown = setInterval(() => {
                timeLeft--;
                if (timeLeft >= 0) {
                    timerNum.textContent = timeLeft;
                    progressLine.style.strokeDashoffset = circumference - (timeLeft / totalTime) * circumference;
                } else {
                    clearInterval(countdown);
                    progressLine.style.strokeDashoffset = circumference;
                    openModal();
                }
            }, 1000);
        }, 1000);
    </script>
</body>
</html>
