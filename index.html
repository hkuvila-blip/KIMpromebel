<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIMpromebel | Конструктор мебели</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; width: 100%; background: #1a1d23; font-family: 'Montserrat', sans-serif; color: white; }

        .hero {
            height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            padding: 0 10%;
            position: relative;
            
            /* ТОНИРОВКА + ПРЯМАЯ ССЫЛКА НА ТВОЕ ФОТО */
            background: 
                linear-gradient(90deg, rgba(26, 29, 35, 0.8) 20%, rgba(26, 29, 35, 0.3) 100%),
                url('https://i.ibb.co/LhyM4pC/image.jpg'); /* Твоя кухня загружена сюда */
            
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .content { z-index: 10; max-width: 800px; }

        h1 { 
            font-size: clamp(40px, 8vw, 80px); 
            font-weight: 900; 
            text-transform: uppercase; 
            line-height: 0.9; 
            margin-bottom: 20px; 
            letter-spacing: -2px;
        }
        
        h1 span { color: #f2c94c; }

        p { 
            font-size: clamp(16px, 2vw, 22px); 
            margin-bottom: 40px; 
            color: #d1d5db; 
            max-width: 600px; 
            font-weight: 400;
        }
        
        .btn {
            padding: 20px 50px; 
            background: #f2c94c; 
            color: #000;
            text-decoration: none; 
            font-weight: 800; 
            text-transform: uppercase;
            display: inline-block; 
            letter-spacing: 1px;
            transition: 0.3s ease;
        }

        .btn:hover { background: #ffffff; transform: translateY(-5px); }

        /* Декоративная линия под заголовком */
        .line { width: 100px; height: 4px; background: #f2c94c; margin-bottom: 30px; }

    </style>
</head>
<body>

    <section class="hero">
        <div class="content">
            <div class="line"></div>
            <h1>KIM<span>PRO</span>MEBEL</h1>
            <p>Профессиональное проектирование мебели и деталировка. Чертежи для производства за 2-3 дня.</p>
            <a href="https://t.me/kimpromebel_pro" target="_blank" class="btn">Обсудить проект</a>
        </div>
    </section>

</body>
</html>
