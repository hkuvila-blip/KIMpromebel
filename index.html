<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIMPROMEBEL | Конструктор мебели</title>
    <link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; width: 100%; background: #111; font-family: 'Golos Text', sans-serif; overflow: hidden; color: white; }

        .hero {
            height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            padding: 0 10%;
            position: relative;
            overflow: hidden; 
        }

        /* ЗЕРКАЛЬНЫЙ ФОН */
        .hero::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://github.com/user-attachments/assets/02702cad-be75-4818-933e-8227e3ba00e9');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transform: scaleX(-1); /* Зеркалим фото */
            z-index: 1;
        }

        /* ПРАВИЛЬНЫЙ ГРАДИЕНТ: ТЕМНЫЙ СЛЕВА -> СВЕТЛЫЙ СПРАВА */
        .hero::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, rgba(17, 17, 17, 0.95) 25%, rgba(17, 17, 17, 0.1) 100%);
            z-index: 2;
        }

        .content { z-index: 10; max-width: 900px; position: relative; }

        h1 { 
            font-size: clamp(32px, 7vw, 72px); 
            font-weight: 900; 
            text-transform: uppercase; 
            line-height: 1; 
            margin-bottom: 24px; 
            letter-spacing: -0.03em; /* Сжимаем буквы для стиля */
        }
        
        h1 span { color: #f2c94c; }

        p { 
            font-size: clamp(15px, 2vw, 20px); 
            margin-bottom: 45px; 
            color: #b0b0b0; 
            max-width: 550px; 
            font-weight: 400;
            line-height: 1.5;
        }
        
        .btn {
            padding: 22px 50px; 
            background: #f2c94c; 
            color: #000;
            text-decoration: none; 
            font-weight: 700; 
            text-transform: uppercase;
            display: inline-block; 
            letter-spacing: 0.05em;
            transition: all 0.3s ease;
            border: 2px solid #f2c94c;
        }

        .btn:hover { background: transparent; color: #f2c94c; transform: translateY(-3px); }

        .logo-top {
            position: absolute;
            top: 40px;
            left: 10%;
            font-weight: 900;
            font-size: 22px;
            letter-spacing: 0.1em;
            z-index: 100;
        }
        .logo-top span { color: #f2c94c; }

    </style>
</head>
<body>

    <div class="logo-top">KIM<span>PROMEBEL</span></div>

    <section class="hero">
        <div class="content">
            <h1>ПРОЕКТИРОВАНИЕ <br><span>КУХОНЬ</span> ДЛЯ <br>ПРОИЗВОДСТВА</h1>
            <p>Техническая документация, деталировка и 3D-визуализация. <br>Конструкторский подход, исключающий ошибки на монтаже.</p>
            <a href="https://t.me/kimpromebel_pro" target="_blank" class="btn">Заказать расчет</a>
        </div>
    </section>

</body>
</html>
