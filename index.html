<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIMPROMEBEL | Конструктор мебели</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; width: 100%; background: #1a1d23; font-family: 'Montserrat', sans-serif; overflow-x: hidden; color: white; }

        .hero {
            height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            padding: 0 10%;
            position: relative;
            /* Важно для позиционирования псевдоэлемента с фоном */
            overflow: hidden; 
        }

        /* ПСЕВДОЭЛЕМЕНТ ДЛЯ ФОНА И ЕГО ЗЕРКАЛИРОВАНИЯ */
        .hero::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            
            /* ССЫЛКА НА ТВОЮ КУХНЮ */
            background-image: url('https://github.com/user-attachments/assets/02702cad-be75-4818-933e-8227e3ba00e9');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            
            /* ЗЕРКАЛЬНЫЙ РАЗВОРОТ ПО ГОРИЗОНТАЛИ */
            transform: scaleX(-1);
            
            z-index: 1; /* Фон уходит вниз */
        }

        /* СЛОЙ С ГРАДИЕНТОМ (Темнее СЛЕВА, Светлее СПРАВА) */
        .hero::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            
            /* ГРАДИЕНТ: слева 90% непрозрачности, справа - 20% (почти прозрачно) */
            background: linear-gradient(90deg, rgba(26, 29, 35, 0.9) 25%, rgba(26, 29, 35, 0.2) 100%);
            
            z-index: 2; /* Градиент ложится ПОВЕРХ зеркального фона */
        }

        /* КОНТЕНТ (ТЕКСТ И КНОПКА) */
        .content { 
            z-index: 10; /* Контент всегда сверху */
            max-width: 850px; 
            position: relative; /* Чтобы z-index сработал */
        }

        h1 { 
            font-size: clamp(30px, 7vw, 70px); 
            font-weight: 900; 
            text-transform: uppercase; 
            line-height: 0.95; 
            margin-bottom: 25px; 
            color: white;
            text-shadow: 0 5px 15px rgba(0,0,0,0.5); /* Легкая тень для объема */
        }
        
        h1 span { color: #f2c94c; }

        p { 
            font-size: clamp(14px, 2vw, 20px); 
            margin-bottom: 40px; 
            color: #d1d5db; 
            max-width: 550px; 
            font-weight: 400;
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        
        .btn {
            padding: 20px 55px; 
            background: #f2c94c; 
            color: #000;
            text-decoration: none; 
            font-weight: 800; 
            text-transform: uppercase;
            display: inline-block; 
            transition: 0.3s ease-out;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .btn:hover { background: #ffffff; transform: translateY(-5px); box-shadow: 0 15px 30px rgba(242, 201, 76, 0.3); }

        .logo-top {
            position: absolute;
            top: 40px;
            left: 10%;
            font-weight: 900;
            font-size: 20px;
            letter-spacing: 2px;
            color: white;
            z-index: 100;
        }
        .logo-top span { color: #f2c94c; }

    </style>
</head>
<body>

    <div class="logo-top">KIM<span>PROMEBEL</span></div>

    <section class="hero">
        <div class="content">
            <h1>ПРОЕКТИРОВАНИЕ <br><span>КУХОНЬ</span> ДЛЯ <br>ПРОИЗВОДСТВА</h1>
            <p>Конструкторская документация, чертежи и 3D-визуализация. Исключаю ошибки при сборке и экономлю ваше время.</p>
            <a href="https://t.me/kimpromebel_pro" target="_blank" class="btn">Обсудить проект</a>
        </div>
    </section>

</body>
</html>
