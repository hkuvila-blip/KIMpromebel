<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KIMPROMEBEL | Exclusive Design (V6)</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;200;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/css/intlTelInput.css">

    <style>
        :root {
            --gold: #f2c94c;
            --pure-black: #0d0d0f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { 
            width: 100%; background: #000; 
            font-family: 'Montserrat', sans-serif; color: white; 
            overflow-x: hidden; min-height: 100vh;
        }

        /* --- BACKGROUND --- */
        .hero {
            min-height: 100vh; width: 100%;
            display: flex; flex-direction: column;
            position: relative; padding: 40px 8%;
            justify-content: space-between;
        }

        .hero-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://github.com/user-attachments/assets/7162f987-ebc5-4a1c-808b-ffa029dc14d5');
            background-size: cover; background-position: center;
            z-index: 1; opacity: 0.9; transform: scaleX(-1); 
        }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, rgba(13,13,15,1) 0%, rgba(13,13,15,0.9) 20%, rgba(13,13,15,0.6) 50%, rgba(13,13,15,0.3) 100%);
            z-index: 2;
        }

        /* --- HEADER & PHONE (V6 REPAIR) --- */
        .top-nav {
            position: relative; display: flex; justify-content: space-between; 
            align-items: center; z-index: 100; width: 100%;
        }
        .logo { font-weight: 900; font-size: clamp(22px, 3vw, 30px); text-transform: uppercase; letter-spacing: 1.5px; }
        .logo span { color: var(--gold); }

        .phone-block { 
            position: relative; /* Для позиционирования круга */
            display: flex; align-items: center; text-decoration: none; color: white; 
            background: rgba(0,0,0,0.5); 
            /* Паддинг справа больше, чтобы освободить место под увеличенный круг */
            padding: 8px 70px 8px 25px; 
            border-radius: 40px;
            backdrop-filter: blur(8px); border: 1px solid rgba(242,201,76,0.15);
            transition: 0.3sEase;
        }
        .phone-block:hover { border-color: var(--gold); background: rgba(0,0,0,0.7); }

        .phone-number { font-size: clamp(18px, 2.2vw, 24px); font-weight: 500; letter-spacing: 0.5px;}

        /* УВЕЛИЧЕННЫЙ КРУГ, НАЛОЖЕННЫЙ СВЕРХУ */
        .phone-icon {
            position: absolute;
            right: -5px; /* Немного вылезает за край, чтобы перекрыть тень */
            top: 50%;
            transform: translateY(-50%);
            
            /* Размер увеличен с 45px до 60px */
            width: 60px; height: 60px; 
            
            /* ТОЛЩИНА ЛИНИИ КРУГА НЕ МЕНЯЕТСЯ (2px) */
            border: 2px solid var(--gold); 
            border-radius: 50%;
            
            display: flex; align-items: center; justify-content: center; color: var(--gold);
            background: #000; /* Плотный фон, чтобы перекрыть фон надписи */
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.8), 0 0 15px rgba(242, 201, 76, 0.2);
            transition: 0.3sEase;
            z-index: 2;
        }
        
        /* ТОЛЩИНА ЛИНИЙ ТРУБКИ НЕ МЕНЯЕТСЯ (SVG stroke-width="2.5") */
        .phone-icon svg { width: 26px; height: 26px; }

        .phone-block:hover .phone-icon {
            box-shadow: 0 5px 25px rgba(0, 0, 0, 1), 0 0 20px rgba(242, 201, 76, 0.4);
            transform: translateY(-53%) scale(1.03);
        }

        /* --- MAIN CONTENT & BUTTON --- */
        .content { 
            position: relative; z-index: 10; 
            display: flex; flex-direction: row; align-items: center;
            justify-content: space-between; gap: 40px; 
            width: 100%; margin: auto 0; padding: 40px 0;
        }

        .text-block { max-width: 750px; display: flex; flex-direction: column; gap: 45px; }
        h1 { font-size: clamp(34px, 5.8vw, 90px); font-weight: 200; line-height: 1.1; text-transform: uppercase; }
        h1 b { font-weight: 900; display: block; } 
        h1 span { color: var(--gold); }

        .btn-main {
            display: block; width: 100%; max-width: 320px; 
            padding: 20px 30px; border: 2px solid var(--gold);
            color: #fff; text-decoration: none; text-transform: uppercase; 
            font-weight: 400; font-size: 18px; letter-spacing: 3px; 
            background: rgba(13, 13, 15, 0.6); text-align: center;
            cursor: pointer; transition: 0.3s; backdrop-filter: blur(5px);
            z-index: 110; position: relative;
        }
        .btn-main:hover { background: var(--gold); color: #000; transform: translateY(-2px); }

        /* --- TIMER --- */
        .timer-wrapper { display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .timer-container { position: relative; width: clamp(200px, 25vw, 350px); height: clamp(200px, 25vw, 350px); }
        .timer-progress { fill: none; stroke: var(--gold); stroke-width: 1.5; stroke-dasharray: 4, 6; }
        .timer-number {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: clamp(70px, 8vw, 120px); font-weight: 100; color: var(--gold);
        }
        .timer-cta { font-size: 11px; text-transform: uppercase; color: var(--gold); letter-spacing: 2px; }

        /* --- FOOTER --- */
        .footer-steps { 
            display: flex; gap: 60px; justify-content: center; z-index: 50; padding-bottom: 30px;
        }
        .step { display: flex; align-items: center; gap: 15px; }
        .dot { width: 12px; height: 12px; background: var(--gold); border-radius: 50%; box-shadow: 0 0 10px var(--gold); }
        .step span { font-size: 1.5rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2.5px; }

        /* --- MOBILE REPAIRS (V6) --- */
        @media (max-width: 1024px) {
            .content { flex-direction: column; text-align: center; }
            .btn-main { margin: 0 auto; }
        }

        @media (max-width: 768px) {
            .top-nav { flex-direction: column; gap: 30px; padding-top: 20px;}
            
            /* На мобильных центрируем крупную кнопку */
            .phone-block { 
                border: none; background: transparent; padding: 0; 
                width: 90px; height: 90px; justify-content: center;
            }
            .phone-number { display: none; }
            
            .phone-icon { 
                position: relative; /* Возвращаем в поток */
                right: auto; top: auto; transform: none;
                width: 90px; height: 90px; /* Крупная кнопка */
                border-width: 3px; /* Чуть толще обводка для масштаба */
                background: rgba(13, 13, 15, 0.9);
                box-shadow: 0 10px 30px rgba(0, 0, 0, 1), 0 0 20px rgba(242, 201, 76, 0.3);
            }
            .phone-icon svg { width: 40px; height: 40px; } /* Крупная трубка */
            
            .phone-block:hover .phone-icon {
                transform: scale(1.05);
                box-shadow: 0 10px 40px rgba(0, 0, 0, 1), 0 0 30px rgba(242, 201, 76, 0.5);
            }

            .footer-steps { flex-direction: column; align-items: flex-start; gap: 20px; margin: 0 auto; width: fit-content; }
            .step span { font-size: 1.3rem; }

            .btn-main { max-width: 290px; }
        }

        /* MODAL */
        .modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); backdrop-filter: blur(10px); }
        .modal-content { background: #0d0d0f; border: 1px solid var(--gold); margin: 10vh auto; padding: 40px 25px; width: 90%; max-width: 450px; text-align: center; }
        .modal-input { width: 100% !important; height: 60px; margin-bottom: 15px; background: rgba(255,255,255,0.05) !important; border: 1px solid #333 !important; color: #fff !important; padding: 0 20px; font-size: 18px; }
        .modal-btn { width: 100%; padding: 22px; background: var(--gold); border: none; font-weight: 900; font-size: 20px; cursor: pointer; text-transform: uppercase; }
        .close-modal { position: absolute; top: 10px; right: 15px; font-size: 30px; color: var(--gold); cursor: pointer; }
        
        .iti { width: 100%; margin-bottom: 15px; }
        .iti__selected-dial-code { color: white; }
    </style>
</head>
<body>

    <section class="hero">
        <div class="hero-bg"></div>
        <div class="overlay"></div>
        
        <nav class="top-nav">
            <div class="logo">KIM<span>PRO</span>MEBEL</div>
            <a href="tel:+380675867998" class="phone-block">
                <div class="phone-number">(+38) 067 586 79 98</div>
                <div class="phone-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                </div>
            </a>
        </nav>

        <div class="content">
            <div class="text-block">
                <h1>Эксклюзивные <b>КУХНИ</b> <span>PRO</span> уровня</h1>
                <div class="btn-main" onclick="openModal()">Заказать проект</div>
            </div>

            <div id="timer-wrapper" class="timer-wrapper">
                <div class="timer-container">
                    <svg viewBox="0 0 100 100" style="transform: rotate(-90deg); width:100%; height:100%;">
                        <circle id="progress" class="timer-progress" cx="50" cy="50" r="45"></circle>
                    </svg>
                    <div id="timer-num" class="timer-number">7</div>
                </div>
                <div class="timer-cta">Оставь заявку — получи скидку</div>
            </div>
        </div>

        <div class="footer-steps">
            <div class="step"><div class="dot"></div><span>Проект</span></div>
            <div class="step"><div class="dot"></div><span>Документы</span></div>
            <div class="step"><div class="dot"></div><span>Производство</span></div>
        </div>
    </section>

    <div id="callback-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h3 style="color:white; margin-bottom: 20px;">Оставьте заявку</h3>
            <input type="text" id="user-name" class="modal-input" placeholder="Ваше имя">
            <input type="tel" id="phone" class="modal-input">
            <button class="modal-btn">Отправить</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/js/intlTelInput.min.js"></script>
    <script>
        const phoneInput = document.querySelector("#phone");
        const iti = window.intlTelInput(phoneInput, {
            initialCountry: "auto",
            separateDialCode: true,
            geoIpLookup: s => fetch("https://ipapi.co/json").then(r => r.json()).then(d => s(d.country_code)).catch(() => s("UA")),
            utilsScript: "https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/js/utils.js"
        });

        function openModal() { document.getElementById('callback-modal').style.display = 'block'; }
        function closeModal() { document.getElementById('callback-modal').style.display = 'none'; }
        
        let current = 7;
        const interval = setInterval(() => {
            if (current >= 0) {
                document.getElementById('timer-num').textContent = current;
                current--;
            } else {
                clearInterval(interval);
                openModal();
            }
        }, 1000);
    </script>
</body>
</html>
