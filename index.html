<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KIMPROMEBEL | Exclusive Design</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;200;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/css/intlTelInput.css">

    <style>
        :root {
            --gold: #f2c94c;
            --gold-soft: rgba(242, 201, 76, 0.08);
            --pure-black: #0d0d0f;
            --graphite-bg: rgba(13, 13, 15, 0.75);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { 
            width: 100%; background: #000; 
            font-family: 'Montserrat', sans-serif; color: white; 
            overflow-x: hidden; min-height: 100vh;
        }

        /* --- BACKGROUND & OVERLAY --- */
        .hero {
            min-height: 100vh; width: 100%;
            display: flex; flex-direction: column;
            position: relative; padding: 40px 8%;
            justify-content: space-between;
        }

        .hero-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://github.com/user-attachments/assets/7162f987-ebc5-4a1c-808b-ffa029dc14d5');
            background-size: cover; background-position: center;
            z-index: 1; opacity: 0.9; 
            filter: contrast(1.1) brightness(0.8); 
            transform: scaleX(-1); 
        }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, 
                rgba(13, 13, 15, 1) 0%, 
                rgba(13, 13, 15, 0.9) 20%, 
                rgba(13, 13, 15, 0.6) 50%, 
                rgba(13, 13, 15, 0.3) 100%);
            z-index: 2;
        }

        /* --- NAVIGATION --- */
        .top-nav {
            position: relative; display: flex; justify-content: space-between; 
            align-items: center; z-index: 100; width: 100%;
        }

        .logo { font-weight: 900; font-size: clamp(22px, 3vw, 30px); text-transform: uppercase; letter-spacing: 1.5px; }
        .logo span { color: var(--gold); }

        .phone-block { 
            display: flex; align-items: center; gap: 15px; 
            text-decoration: none; color: white; 
            background: rgba(0, 0, 0, 0.4); 
            padding: 8px 15px; border-radius: 40px;
            backdrop-filter: blur(8px); 
            border: 1px solid rgba(242, 201, 76, 0.2);
            transition: 0.3s ease;
        }
        .phone-block:hover { border-color: var(--gold); background: rgba(0,0,0,0.6); }

        .phone-number { font-size: clamp(18px, 2.2vw, 24px); font-weight: 500; letter-spacing: 0.5px; }

        .phone-icon {
            width: clamp(40px, 5vw, 55px); height: clamp(40px, 5vw, 55px); 
            border: 2px solid var(--gold); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; color: var(--gold);
            box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.9);
            background: rgba(13, 13, 15, 0.3);
            transition: 0.3s ease;
        }

        /* --- MAIN CONTENT --- */
        .content { 
            position: relative; z-index: 10; 
            display: flex; flex-direction: row; align-items: center;
            justify-content: space-between; gap: 40px; 
            width: 100%; margin: auto 0; padding: 60px 0;
        }

        .text-block { max-width: 750px; display: flex; flex-direction: column; gap: 45px; }

        h1 { 
            font-size: clamp(34px, 5.8vw, 90px); font-weight: 200; line-height: 1.1; 
            text-transform: uppercase;
            text-shadow: 2px 2px 15px rgba(0,0,0,0.8); 
        }
        h1 b { font-weight: 900; display: block; letter-spacing: 0.05em; margin: 5px 0; } 
        h1 span { color: var(--gold); }

        /* КНОПКА ЗАКАЗАТЬ ПРОЕКТ */
        .btn-main {
            padding: 18px 40px; 
            border: 2px solid var(--gold);
            color: #fff; text-decoration: none; 
            text-transform: uppercase; 
            font-weight: 400; 
            font-size: 18px; 
            letter-spacing: 3px; 
            background: rgba(13, 13, 15, 0.6); 
            display: inline-block; 
            transition: all 0.4s ease;
            cursor: pointer; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            max-width: 320px;
            width: 100%;
            text-align: center;
        }
        .btn-main:hover {
            background: var(--gold); color: #000;
            box-shadow: 0 0 40px rgba(242, 201, 76, 0.4);
            transform: translateY(-2px);
        }

        /* --- TIMER --- */
        .timer-wrapper { display: flex; flex-direction: column; align-items: center; gap: 25px; }
        .timer-container {
            position: relative; width: clamp(230px, 26vw, 380px); height: clamp(230px, 26vw, 380px);
            background: rgba(0,0,0,0.2); border-radius: 50%;
        }
        .timer-progress { fill: none; stroke: var(--gold); stroke-width: 1.2; stroke-dasharray: 4, 6; }
        .timer-number {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: clamp(80px, 9vw, 130px); font-weight: 100; color: var(--gold);
        }
        .timer-cta { font-size: 12px; text-transform: uppercase; color: var(--gold); letter-spacing: 3px; }

        /* --- FOOTER STEPS (VER 2 FIX) --- */
        .footer-steps { display: flex; gap: 50px; justify-content: center; z-index: 50; padding-bottom: 30px;}
        .step { display: flex; align-items: center; gap: 12px; }
        .dot { width: 10px; height: 10px; background: var(--gold); border-radius: 50%; box-shadow: 0 0 8px var(--gold); }
        .step span { 
            font-size: 1.5rem; 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 2.5px; 
        }

        /* --- MODAL --- */
        .modal { 
            display: none; position: fixed; z-index: 9999; 
            left: 0; top: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); backdrop-filter: blur(15px); 
        }

        .modal-content { 
            background: #0d0d0f; border: 1px solid var(--gold); 
            margin: 10vh auto; padding: 50px 30px; 
            width: 92%; max-width: 480px; text-align: center; 
            position: relative; display: flex; flex-direction: column; gap: 25px;
        }

        .modal-content h3 { font-weight: 100; letter-spacing: 1px; font-size: 18px; color: #fff; text-transform: uppercase; }
        .modal-input {
            width: 100% !important; height: 60px; padding: 0 20px;
            background: rgba(255,255,255,0.03) !important;
            border: 1px solid rgba(242, 201, 76, 0.4) !important; 
            color: #fff !important; outline: none; font-size: 18px;
        }

        .iti { width: 100%; text-align: left; }
        .iti__selected-dial-code { color: #fff !important; margin-left: 6px; }

        .modal-btn {
            width: 100%; padding: 22px; background: var(--gold);
            color: #000; border: none; font-weight: 900; 
            text-transform: uppercase; cursor: pointer; 
            font-size: 22px; letter-spacing: 4px; transition: 0.3s;
        }

        .close-modal { position: absolute; top: 10px; right: 15px; font-size: 30px; color: var(--gold); cursor: pointer; }

        /* --- ADAPTIVITY --- */
        @media (max-width: 1024px) {
            .content { flex-direction: column; text-align: center; gap: 60px;}
            .btn-main { margin: 0 auto; }
            .text-block { gap: 30px; }
        }
        @media (max-width: 768px) {
            .top-nav { flex-direction: column; gap: 20px; }
            .phone-number { display: none; }
            .phone-icon { width: 65px; height: 65px; }
            
            .footer-steps { flex-direction: column; align-items: flex-start; gap: 20px; margin: 0 auto; width: fit-content; }
            .step span { font-size: 1.3rem; }
            
            .btn-main { max-width: 290px; font-size: 16px; padding: 18px; }
        }
    </style>
</head>
<body>

    <section class="hero">
        <div class="hero-bg"></div>
        <div class="overlay"></div>
        
        <nav class="top-nav">
            <div class="logo">KIM<span>PRO</span>MEBEL</div>
            <a href="tel:+380675867998" class="phone-block">
                <div class="phone-number">(+38) 067 586 79 98</div>
                <div class="phone-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                </div>
            </a>
        </nav>

        <div class="content">
            <div class="text-block">
                <h1>Эксклюзивные <b>КУХНИ</b> <span>PRO</span> уровня</h1>
                <div class="btn-main" onclick="openModal()">Заказать проект</div>
            </div>

            <div id="timer-wrapper" class="timer-wrapper">
                <div class="timer-container">
                    <svg viewBox="0 0 100 100" style="transform: rotate(-90deg); width:100%; height:100%;">
                        <circle id="progress" class="timer-progress" cx="50" cy="50" r="45"></circle>
                    </svg>
                    <div id="timer-num" class="timer-number">7</div>
                </div>
                <div class="timer-cta">Оставь заявку — получи скидку</div>
            </div>
        </div>

        <div class="footer-steps">
            <div class="step"><div class="dot"></div><span>Проект</span></div>
            <div class="step"><div class="dot"></div><span>Документы</span></div>
            <div class="step"><div class="dot"></div><span>Производство</span></div>
        </div>
    </section>

    <div id="callback-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h3>ВВЕДИТЕ ИМЯ И ТЕЛЕФОН. <span>МЫ СВЯЖЕМСЯ С ВАМИ</span></h3>
            <input type="text" id="user-name" class="modal-input" placeholder="Имя">
            <input type="tel" id="phone" class="modal-input">
            <button class="modal-btn" onclick="submitForm()">ОТПРАВИТЬ</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/js/intlTelInput.min.js"></script>
    <script>
        const phoneInput = document.querySelector("#phone");
        const iti = window.intlTelInput(phoneInput, {
            initialCountry: "auto",
            geoIpLookup: (success) => fetch("https://ipapi.co/json").then(r => r.json()).then(d => success(d.country_code)).catch(() => success("UA")),
            utilsScript: "https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/js/utils.js",
            separateDialCode: true
        });

        function openModal() { document.getElementById('callback-modal').style.display = 'block'; }
        function closeModal() { document.getElementById('callback-modal').style.display = 'none'; }

        let current = 7;
        const interval = setInterval(() => {
            if (current >= 0) {
                document.getElementById('timer-num').textContent = current;
                current--;
            } else {
                clearInterval(interval);
                openModal();
            }
        }, 1000);
    </script>
</body>
</html>
