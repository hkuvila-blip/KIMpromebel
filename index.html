<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIMPROMEBEL | Exclusive Design</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c5a059;
            --dark: #1a1a1a;
            --white: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Montserrat', sans-serif;
            background-color: var(--dark);
            color: var(--white);
            overflow: hidden;
        }

        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1556912172-45b7abe8b7e1?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        header {
            padding: 40px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .logo span {
            color: var(--gold);
        }

        .contact-info {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 20px;
            border-radius: 50px;
            border: 1px solid rgba(197, 160, 89, 0.3);
        }

        .phone-icon {
            color: var(--gold);
            margin-left: 15px;
            border: 1px solid var(--gold);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        main {
            padding: 0 60px;
            margin-top: 50px;
        }

        h1 {
            font-size: 48px;
            font-weight: 300;
            margin-bottom: 0;
            text-transform: uppercase;
            letter-spacing: 5px;
        }

        h1 b {
            font-weight: 700;
            display: block;
            font-size: 64px;
        }

        .highlight {
            color: var(--gold);
            font-size: 54px;
            display: block;
            margin-top: 10px;
        }

        .cta-button {
            margin-top: 40px;
            padding: 15px 40px;
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--white);
            font-size: 14px;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .cta-button:hover {
            background: var(--gold);
            color: var(--dark);
        }

        #timer {
            position: absolute;
            right: 15%;
            top: 45%;
            font-size: 120px;
            opacity: 0.2;
            font-weight: 700;
            color: var(--gold);
        }

        .sub-text {
            position: absolute;
            right: 60px;
            bottom: 250px;
            color: var(--gold);
            letter-spacing: 2px;
            font-size: 14px;
        }

        footer {
            position: absolute;
            bottom: 60px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 40px;
        }

        .step {
            display: flex;
            align-items: center;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .step::before {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--gold);
            border-radius: 50%;
            margin-right: 10px;
        }

        #modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: var(--dark);
            padding: 40px;
            border: 1px solid var(--gold);
            width: 300px;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div class="bg-container"></div>

    <header>
        <div class="logo">KIMPRO<span>MEBEL</span></div>
        <div class="contact-info">
            (+38) 067 586 79 98
            <div class="phone-icon">📞</div>
        </div>
    </header>

    <main>
        <h1>ЭКСКЛЮЗИВНЫЕ<br><b>КУХНИ</b><span class="highlight">PRO УРОВНЯ</span></h1>
        <button class="cta-button" onclick="openModal()">Заказать проект</button>
    </main>

    <div id="timer"></div>
    <div class="sub-text">ОСТАВЬ ЗАЯВКУ — ПОЛУЧИ СКИДКУ</div>

    <footer>
        <div class="step">Проект</div>
        <div class="step">Документы</div>
        <div class="step">Производство</div>
    </footer>

    <div id="modal">
        <div class="modal-content">
            <h3 style="color:var(--gold)">ОСТАВИТЬ ЗАЯВКУ</h3>
            <form action="https://formspree.io/f/maqpvnvp" method="POST">
                <input type="text" name="name" placeholder="Ваше имя" required>
                <input type="tel" name="phone" placeholder="Ваш телефон" required>
                <button type="submit" class="cta-button" style="width:100%">Отправить</button>
            </form>
            <button onclick="closeModal()" style="background:none; border:none; color:gray; margin-top:15px; cursor:pointer">Закрыть</button>
        </div>
    </div>

    <script>
        var countDownDate = new Date().getTime() + 10000; // 10 секунд для теста

        var x = setInterval(function() {
            var now = new Date().getTime();
            var distance = countDownDate - now;
            var seconds = Math.floor((distance % (1000 * 60)) / 1000);

            var timer = document.getElementById("timer");
            timer.innerHTML = seconds;

            if (distance < 0) {
                clearInterval(x);
                timer.style.display = 'none'; // Устранение погрешности с "0"
            }
        }, 1000);

        function openModal() { document.getElementById('modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }
    </script>

</body>
</html>
