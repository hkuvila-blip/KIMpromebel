<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KIMPROMEBEL | Exclusive Design</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #f2c94c;
            --dark: #0d0d0f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { 
            height: 100%; width: 100%; 
            background: var(--dark); 
            font-family: 'Montserrat', sans-serif; 
            color: white; 
            overflow-x: hidden;
        }

        .hero {
            min-height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            position: relative;
            padding: 0 8%;
        }

        .hero-bg {
            position: absolute;
            top: 0; right: 0;
            width: 80%; height: 100%;
            background-image: url('https://github.com/user-attachments/assets/7162f987-ebc5-4a1c-808b-ffa029dc14d5');
            background-size: cover; background-position: center;
            z-index: 1;
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, rgba(13,13,15,0.98) 15%, rgba(13,13,15,0.6) 50%, rgba(13,13,15,0.2) 100%);
            z-index: 2;
        }

        /* КОНТЕНТ-КОНТЕЙНЕР */
        .content { 
            position: relative; 
            z-index: 10; 
            max-width: 850px; 
            display: flex;
            flex-direction: column;
            gap: 25px; /* Отступы между блоками на ПК */
        }

        h1 {
            font-size: clamp(32px, 6vw, 85px);
            font-weight: 200; line-height: 1.1;
            text-transform: uppercase;
        }
        h1 b { font-weight: 900; display: block; }
        h1 span { color: var(--gold); }

        .description {
            font-size: clamp(15px, 1.5vw, 19px);
            font-weight: 400; line-height: 1.6;
            color: rgba(255,255,255,0.8);
            max-width: 500px;
            border-left: 3px solid var(--gold); padding-left: 20px;
        }

        .btn {
            padding: 18px 45px;
            border: 1px solid var(--gold);
            color: white; text-decoration: none;
            text-transform: uppercase; font-weight: 700;
            font-size: 13px; letter-spacing: 2px;
            background: rgba(242, 201, 76, 0.05);
            display: inline-block; transition: 0.3s;
            align-self: flex-start;
        }
        .btn:hover { background: var(--gold); color: black; }

        /* ШАПКА */
        .top-nav {
            position: absolute; top: 30px; left: 8%; right: 8%;
            display: flex; justify-content: space-between; align-items: center; z-index: 100;
        }
        .logo { font-weight: 900; font-size: 22px; }
        .logo span { color: var(--gold); }
        .phone-block { display: flex; align-items: center; gap: 12px; text-decoration: none; color: white; }
        .phone-icon {
            width: 40px; height: 40px; border: 1.5px solid var(--gold); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; color: var(--gold);
        }

        /* --- ЭТАПЫ (ФУТЕР) --- */
        .footer-steps {
            display: flex;
            z-index: 50;
        }

        /* Стиль для ПК */
        @media (min-width: 1025px) {
            .footer-steps {
                position: fixed;
                bottom: 40px;
                left: 50%;
                transform: translateX(-50%);
                flex-direction: row;
                justify-content: center;
                gap: 50px;
                width: 100%;
            }
        }

        .step { display: flex; align-items: center; gap: 10px; }
        .dot { 
            width: 8px; height: 8px; 
            background: var(--gold); border-radius: 50%; 
            box-shadow: 0 0 10px var(--gold); flex-shrink: 0;
        }
        .step span { 
            font-size: 13px; font-weight: 700; 
            text-transform: uppercase; letter-spacing: 1px;
        }

        /* --- УСЛОВИЯ ДЛЯ ПЛАНШЕТА И СМАРТФОНА --- */
        @media (max-width: 1024px) {
            .hero { 
                padding: 100px 5% 50px; 
                justify-content: center; /* Центрируем весь контент-блок по вертикали */
                align-items: center;
            }
            .content { 
                align-items: center; 
                text-align: center; 
                width: 100%;
                gap: 20px; /* Уменьшаем отступы, чтобы всё влезло */
            }
            .description { 
                border-left: none; padding-left: 0; 
                margin: 0 auto;
                font-size: 15px; /* Уменьшаем шрифт описания */
            }
            .btn { align-self: center; }
            .phone-number { display: none; }

            /* Надписи строго ПОД кнопкой по центру */
            .footer-steps {
                position: relative;
                bottom: auto; left: auto; transform: none;
                margin-top: 15px; /* Небольшой отступ от кнопки */
                flex-direction: column; 
                gap: 12px; /* Компактное расположение пунктов */
                width: 100%;
            }
            
            .step { justify-content: center; }
            .step span { 
                font-size: 12px; /* Уменьшаем шрифт этапов для мобилок */
                white-space: nowrap; 
            }
            
            h1 { font-size: clamp(28px, 8vw, 50px); } /* Более компактный заголовок */
        }

        /* Условие для очень маленьких экранов (высота < 650px) */
        @media (max-height: 650px) and (max-width: 1024px) {
            .content { gap: 10px; }
            .description { display: none; } /* Скрываем описание на совсем мелких экранах, чтобы не было наезда */
            .footer-steps { margin-top: 10px; }
        }
    </style>
</head>
<body>

    <nav class="top-nav">
        <div class="logo">KIM<span>PRO</span>MEBEL</div>
        <a href="tel:+380675867998" class="phone-block">
            <div class="phone-number">(+38) 067 586 79 98</div>
            <div class="phone-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
            </div>
        </a>
    </nav>

    <section class="hero">
        <div class="hero-bg"></div>
        <div class="overlay"></div>
        
        <div class="content">
            <h1>Эксклюзивные <b>КУХНИ</b> <span>PRO</span> уровня</h1>
            
            <div class="description">
                Индивидуальное проектирование и деталировка. 
                Создаем техническую базу для безупречного производства.
            </div>
            
            <a href="https://t.me/mihailkuvila" target="_blank" class="btn">Заказать проект</a>

            <div class="footer-steps">
                <div class="step"><div class="dot"></div><span>1. Создаём 3д проект</span></div>
                <div class="step"><div class="dot"></div><span>2. Готовим документы</span></div>
                <div class="step"><div class="dot"></div><span>3. Отправляем на производство</span></div>
            </div>
        </div>
    </section>

</body>
</html>
