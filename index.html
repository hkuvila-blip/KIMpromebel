<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIMPROMEBEL | Exclusive Design</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #f2c94c;
            --dark: #0d0d0f;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            height: 100%; width: 100%; 
            background: var(--dark); 
            font-family: 'Montserrat', sans-serif; 
            color: white; 
            overflow-x: hidden; /* Запрещаем горизонтальный скролл */
        }

        .hero {
            height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            position: relative;
            padding: 0 8%;
        }

        .hero-bg {
            position: absolute;
            top: 0; right: 0;
            width: 80%;
            height: 100%;
            background-image: url('https://github.com/user-attachments/assets/7162f987-ebc5-4a1c-808b-ffa029dc14d5');
            background-size: cover;
            background-position: center;
            z-index: 1;
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, 
                rgba(13, 13, 15, 0.95) 20%, 
                rgba(13, 13, 15, 0.5) 60%, 
                rgba(13, 13, 15, 0.1) 100%
            );
            backdrop-filter: blur(1.5px);
            z-index: 2;
        }

        .content { 
            position: relative; 
            z-index: 10; 
            max-width: 800px;
            animation: fadeInUp 1s ease-out forwards; 
        }

        h1 {
            font-size: clamp(32px, 7vw, 85px);
            font-weight: 200;
            line-height: 1.1;
            text-transform: uppercase;
            margin-bottom: 25px;
        }

        h1 b { font-weight: 900; display: block; }
        h1 span { color: var(--gold); }

        .description {
            font-size: clamp(14px, 1.5vw, 16px);
            font-weight: 400;
            line-height: 1.6;
            color: rgba(255,255,255,0.8);
            max-width: 450px;
            margin-bottom: 40px;
            border-left: 2px solid var(--gold);
            padding-left: 20px;
        }

        .btn {
            padding: 18px 40px;
            border: 1px solid var(--gold);
            color: white;
            text-decoration: none;
            text-transform: uppercase;
            font-weight: 700;
            font-size: 11px;
            letter-spacing: 2px;
            transition: 0.3s;
            background: rgba(242, 201, 76, 0.1);
            display: inline-block;
        }

        /* ТЕЛЕФОН */
        .phone-block {
            position: absolute;
            top: 30px;
            right: 8%;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: white;
        }

        .phone-icon {
            width: 34px; height: 34px;
            border: 1px solid var(--gold);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: var(--gold);
            font-size: 14px;
        }

        .phone-number { font-size: 15px; font-weight: 500; letter-spacing: 0.5px; }

        /* ЭТАПЫ (НИЗ) */
        .steps-bar {
            position: absolute;
            bottom: 40px;
            left: 8%;
            display: flex;
            gap: 30px;
            z-index: 20;
        }

        .step-item { display: flex; align-items: center; gap: 8px; }
        .dot-marker { width: 6px; height: 6px; background-color: var(--gold); border-radius: 50%; }
        .step-text { font-size: 9px; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; color: rgba(255, 255, 255, 0.8); }

        header { position: absolute; top: 30px; left: 8%; z-index: 100; }
        .logo { font-weight: 900; font-size: 18px; letter-spacing: 1px; }
        .logo span { color: var(--gold); }

        /* --- АДАПТИВНОСТЬ ДЛЯ МОБИЛЬНЫХ (Smartphones) --- */
        @media (max-width: 768px) {
            .hero { padding: 0 5%; justify-content: center; text-align: center; }
            
            .hero-bg { width: 100%; opacity: 0.6; } /* На мобильных фото — на весь экран фоном */
            
            .overlay {
                background: radial-gradient(circle, rgba(13, 13, 15, 0.7) 0%, rgba(13, 13, 15, 0.95) 100%);
            }

            .description { border-left: none; padding-left: 0; margin: 0 auto 30px; }

            .phone-number { display: none; } /* Оставляем только иконку трубки */
            .phone-block { right: 5%; top: 25px; }
            header { left: 5%; top: 25px; }

            .steps-bar { 
                left: 0; right: 0; bottom: 20px;
                flex-direction: column; 
                align-items: center; 
                gap: 8px; 
            }
            
            .step-text { font-size: 8px; }
            
            h1 { font-size: 38px; margin-bottom: 20px; }
        }

        /* Для очень маленьких экранов (iPhone SE и т.д.) */
        @media (max-width: 380px) {
            h1 { font-size: 30px; }
            .btn { width: 100%; text-align: center; }
        }

    </style>
</head>
<body>

    <header>
        <div class="logo">KIM<span>PRO</span>MEBEL</div>
    </header>

    <a href="tel:+380675867998" class="phone-block">
        <div class="phone-icon">📞</div>
        <div class="phone-number"><span>(+38)</span> 067 586 79 98</div>
    </a>

    <section class="hero">
        <div class="hero-bg"></div>
        <div class="overlay"></div>
        
        <div class="content">
            <h1>Эксклюзивные <b>КУХНИ</b> <span>PRO</span> уровня</h1>
            <div class="description">
                Индивидуальное проектирование и деталировка. 
                Создаем техническую базу для безупречного производства.
            </div>
            <a href="https://t.me/mihailkuvila" target="_blank" class="btn">Заказать проект</a>
        </div>

        <div class="steps-bar">
            <div class="step-item"><div class="dot-marker"></div><span class="step-text">создаем 3д проект</span></div>
            <div class="step-item"><div class="dot-marker"></div><span class="step-text">готовим тех. часть</span></div>
            <div class="step-item"><div class="dot-marker"></div><span class="step-text">отправляем в цех</span></div>
        </div>
    </section>

</body>
</html>
