<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIMPROMEBEL | Exclusive Design</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #f2c94c;
            --dark: #0d0d0f;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            height: 100%; width: 100%; 
            background: var(--dark); 
            font-family: 'Montserrat', sans-serif; 
            color: white; 
            overflow: hidden;
        }

        .hero {
            height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            position: relative;
            padding: 0 8%;
        }

        .hero-bg {
            position: absolute;
            top: 0; right: 0;
            width: 80%; /* Слегка увеличил охват картинки */
            height: 100%;
            background-image: url('https://github.com/user-attachments/assets/7162f987-ebc5-4a1c-808b-ffa029dc14d5');
            background-size: cover;
            background-position: center;
            z-index: 1;
        }

        /* КОРРЕКЦИЯ ПРОЗРАЧНОСТИ И ЧЕТКОСТИ */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, 
                rgba(13, 13, 15, 0.92) 20%, /* Чуть прозрачнее слева */
                rgba(13, 13, 15, 0.4) 60%,  /* Значительно прозрачнее в центре */
                rgba(13, 13, 15, 0.05) 100% /* Почти чистая картинка справа */
            );
            /* МЕНЬШЕ РАЗМЫТИЯ: было 4px-5px, стало 1.5px для легкого эффекта чистого стекла */
            backdrop-filter: blur(1.5px); 
            z-index: 2;
        }

        .content { 
            position: relative; 
            z-index: 10; 
            max-width: 800px;
            animation: fadeInUp 1s ease-out forwards; 
        }

        h1 {
            font-size: clamp(35px, 7vw, 85px);
            font-weight: 200;
            line-height: 1;
            text-transform: uppercase;
            margin-bottom: 25px;
            letter-spacing: -1px; /* Сделал буквы четче за счет интервала */
        }

        h1 b { font-weight: 900; display: block; }
        h1 span { color: var(--gold); }

        .description {
            font-size: 16px;
            font-weight: 400;
            line-height: 1.7;
            color: rgba(255,255,255,0.8); /* Сделал текст ярче/белее */
            max-width: 450px;
            margin-bottom: 40px;
            border-left: 2px solid var(--gold); /* Линия чуть толще и четче */
            padding-left: 25px;
        }

        .btn {
            padding: 18px 48px;
            border: 1px solid rgba(242, 201, 76, 0.5); /* Тонкая четкая рамка */
            color: white;
            text-decoration: none;
            text-transform: uppercase;
            font-weight: 700;
            font-size: 12px;
            letter-spacing: 2px;
            transition: 0.3s;
            background: rgba(242, 201, 76, 0.08);
            display: inline-block;
        }

        .btn:hover { 
            background: var(--gold); 
            color: black; 
            border-color: var(--gold);
            transform: translateY(-2px); 
            box-shadow: 0 5px 15px rgba(242, 201, 76, 0.3); 
        }

        .phone-block {
            position: absolute;
            top: 40px;
            right: 8%;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: white;
            transition: 0.3s;
        }

        .phone-icon {
            width: 36px; height: 36px;
            border: 1px solid var(--gold);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: var(--gold);
            background: rgba(13, 13, 15, 0.5); /* Четкий фон у иконки */
        }

        .phone-number { font-size: 16px; font-weight: 500; }
        .phone-number span { color: var(--gold); font-weight: 700; }

        .steps-bar {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 40px;
            z-index: 20;
            animation: fadeInUp 1.2s ease-out forwards;
        }

        .step-item { display: flex; align-items: center; gap: 10px; }
        .dot-marker { 
            width: 6px; height: 6px; 
            background-color: var(--gold); 
            border-radius: 50%; 
            box-shadow: 0 0 8px var(--gold); 
        }
        .step-text { 
            font-size: 10px; 
            font-weight: 500; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            color: rgba(255, 255, 255, 0.9); 
        }

        header { position: absolute; top: 40px; left: 8%; z-index: 100; }
        .logo { font-weight: 900; font-size: 20px; letter-spacing: 2px; }
        .logo span { color: var(--gold); }

        @media (max-width: 768px) {
            .phone-number { display: none; }
            .steps-bar { flex-direction: column; gap: 12px; bottom: 25px; align-items: center; }
            .hero-bg { width: 100%; opacity: 0.5; }
        }

    </style>
</head>
<body>

    <header>
        <div class="logo">KIM<span>PRO</span>MEBEL</div>
    </header>

    <a href="tel:+380675867998" class="phone-block">
        <div class="phone-icon">📞</div>
        <div class="phone-number"><span>(+38)</span> 067 586 79 98</div>
    </a>

    <section class="hero">
        <div class="hero-bg"></div>
        <div class="overlay"></div>
        
        <div class="content">
            <h1>Эксклюзивные <b>КУХНИ</b> <span>PRO</span> уровня</h1>
            <div class="description">
                Индивидуальное проектирование и деталировка. 
                Создаем техническую базу для безупречного производства.
            </div>
            <a href="https://t.me/mihailkuvila" target="_blank" class="btn">Заказать проект</a>
        </div>

        <div class="steps-bar">
            <div class="step-item">
                <div class="dot-marker"></div>
                <span class="step-text">создаем 3д проект</span>
            </div>
            <div class="step-item">
                <div class="dot-marker"></div>
                <span class="step-text">готовим техническую часть</span>
            </div>
            <div class="step-item">
                <div class="dot-marker"></div>
                <span class="step-text">отправляем на производство</span>
            </div>
        </div>
    </section>

</body>
</html>
