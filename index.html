<style>
    .modal { 
        display: none; position: fixed; z-index: 9999; 
        left: 0; top: 0; width: 100%; height: 100%; 
        background: rgba(0,0,0,0.98); backdrop-filter: blur(15px); 
    }

    .modal-content { 
        background: #0d0d0f; border: 0.8px solid var(--gold); 
        margin: 12vh auto; padding: 60px 40px; 
        width: 92%; max-width: 550px; text-align: center; 
        position: relative;
        /* Создаем вертикальный стек с отступами */
        display: flex; flex-direction: column; gap: 35px;
        box-shadow: 0 0 80px rgba(242, 201, 76, 0.1);
    }

    .modal-content h3 { 
        color: #fff; text-transform: uppercase; 
        font-weight: 200; letter-spacing: 2px; line-height: 1.4;
        font-size: clamp(18px, 4vw, 24px);
        margin: 0; 
    }
    
    .modal-content h3 span { color: var(--gold); font-weight: 700; }

    /* Контейнер для плагина номера телефона */
    .iti { width: 100%; }
    
    .modal-input {
        width: 100%; padding: 22px 20px 22px 52px !important; 
        background: rgba(255,255,255,0.03) !important;
        border: 1px solid rgba(242, 201, 76, 0.5) !important; 
        color: #fff !important; border-radius: 0 !important; 
        outline: none; font-size: 18px;
    }

    .modal-btn {
        width: 100%; padding: 25px 10px;
        background: var(--gold); color: #000; border: none; 
        font-weight: 900; text-transform: uppercase; 
        cursor: pointer; 
        font-size: clamp(20px, 6vw, 32px); /* Адаптивный размер шрифта */
        letter-spacing: 3px;
        transition: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
    }

    .modal-btn:hover { 
        background: #fff; 
        box-shadow: 0 10px 30px rgba(242, 201, 76, 0.3); 
    }

    .close-modal { 
        position: absolute; top: 15px; right: 20px; 
        font-size: 35px; color: var(--gold); cursor: pointer; 
        opacity: 0.5; transition: 0.3s; 
    }

    @media (max-width: 480px) {
        .modal-content { padding: 45px 25px; gap: 25px; margin: 15vh auto; }
        .modal-btn { padding: 20px 5px; }
    }
</style>

<div id="callback-modal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <h3>Напишите Ваш номер — <br><span>мы свяжемся с Вами</span></h3>
        
        <div class="input-wrapper">
            <input type="tel" id="phone" class="modal-input">
        </div>
        
        <button class="modal-btn" onclick="submitForm()">ОТПРАВИТЬ</button>
    </div>
</div>
