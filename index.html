<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KIMPROMEBEL | Exclusive Design</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #f2c94c;
            --gold-glare: rgba(242, 201, 76, 0.05);
            --gold-soft: rgba(242, 201, 76, 0.08);
            --pure-black: #0d0d0f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { 
            width: 100%; 
            background: #000; 
            font-family: 'Montserrat', sans-serif; 
            color: white; 
            /* Убираем блокировку скролла */
            overflow-x: hidden;
            overflow-y: auto;
        }

        @keyframes shine-slide {
            0% { transform: translateX(-150%) skewX(-25deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateX(350%) skewX(-25deg); opacity: 0; }
        }

        .hero {
            min-height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column; /* Элементы идут строго друг за другом */
            position: relative;
            padding: 40px 8%;
        }

        .hero-bg {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url('https://github.com/user-attachments/assets/7162f987-ebc5-4a1c-808b-ffa029dc14d5');
            background-size: cover; background-position: center;
            z-index: 1;
            opacity: 0.95;
            filter: contrast(1.15);
            transform: scaleX(-1); 
            /* Фиксируем фон относительно контейнера */
            background-attachment: scroll;
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 5% 20%, var(--gold-soft) 0%, transparent 40%),
                linear-gradient(90deg, #0d0d0f 0%, #0d0d0f 25%, rgba(13, 13, 15, 0.7) 45%, rgba(13, 13, 15, 0) 100%);
            z-index: 2;
            overflow: hidden;
        }

        .overlay::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 30%; height: 100%;
            background: linear-gradient(90deg, transparent 0%, var(--gold-glare) 50%, transparent 100%);
            animation: shine-slide 3s ease-in-out forwards;
            z-index: 3;
            backdrop-filter: blur(1px);
        }

        /* НАВИГАЦИЯ — СТАЛА ПОТОКОВОЙ */
        .top-nav {
            position: relative; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            z-index: 100;
            margin-bottom: 60px; /* Отступ от шапки до заголовка */
        }

        .logo { font-weight: 900; font-size: 24px; text-transform: uppercase; letter-spacing: 1px; }
        .logo span { color: var(--gold); }

        .phone-block { display: flex; align-items: center; gap: 12px; text-decoration: none; color: white; }
        .phone-icon {
            width: 40px; height: 40px; border: 1.5px solid var(--gold); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; color: var(--gold);
        }

        /* КОНТЕНТ */
        .content { 
            position: relative; 
            z-index: 10; 
            max-width: 900px; 
            display: flex;
            flex-direction: column;
            gap: 45px; 
            flex-grow: 1; /* Позволяет контенту занимать место */
            justify-content: center;
        }

        h1 {
            font-size: clamp(32px, 6vw, 85px);
            font-weight: 200;
            line-height: 1.1;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        h1 b { 
            font-weight: 900; 
            display: block; 
            letter-spacing: 0.06em; 
            margin: 5px 0;
            -webkit-text-stroke: 0;
        } 
        
        h1 span { color: var(--gold); font-weight: 200; }

        .description {
            font-size: clamp(20px, 2vw, 25px); 
            font-weight: 400; line-height: 1.5;
            color: rgba(255,255,255,0.9);
            max-width: 650px;
            border-left: 4px solid var(--gold); 
            padding-left: 25px;
        }

        .btn {
            padding: 20px 55px;
            border: 1px solid var(--gold);
            color: white; text-decoration: none;
            text-transform: uppercase; font-weight: 700;
            font-size: 13px; letter-spacing: 2px;
            background: rgba(242, 201, 76, 0.05);
            display: inline-block; transition: 0.3s;
            align-self: flex-start;
            margin-bottom: 40px; /* Отступ до футера */
        }
        .btn:hover { background: var(--gold); color: black; box-shadow: 0 0 50px rgba(242, 201, 76, 0.4); }

        /* ФУТЕР — СТАЛ ПОТОКОВЫМ */
        .footer-steps { 
            position: relative; 
            display: flex; 
            z-index: 50; 
            width: 100%;
            margin-top: auto; /* Прижимается к низу, если места много */
            padding-top: 40px;
            gap: 40px;
        }

        .step { display: flex; align-items: center; gap: 10px; }
        .dot { 
            width: 8px; height: 8px; background: var(--gold); border-radius: 50%; 
            box-shadow: 0 0 10px var(--gold); flex-shrink: 0;
        }
        .step span { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; opacity: 0.8; }

        /* АДАПТИВНОСТЬ ДЛЯ ПЛАНШЕТОВ И МОБИЛЬНЫХ */
        @media (max-width: 1024px) {
            .hero { padding: 40px 5%; height: auto; min-height: 100vh; }
            
            .top-nav { 
                flex-direction: column; 
                gap: 30px; 
                margin-bottom: 50px; 
            }
            .logo { font-size: 22px; }
            .phone-number { display: none; }
            .phone-icon { width: 70px; height: 70px; background: rgba(242, 201, 76, 0.1); }
            .phone-icon svg { width: 30px; height: 30px; }

            .content { align-items: center; text-align: center; gap: 40px; flex-grow: 0; }
            .description { font-size: 18px; border-left: none; padding-left: 0; margin: 0 auto; }
            
            .btn { align-self: center; margin-bottom: 60px; }

            .footer-steps { 
                flex-direction: column; 
                align-items: center; 
                text-align: center; 
                gap: 25px; 
                margin-top: 20px;
                padding-bottom: 40px;
            }
            .step { justify-content: center; }
            h1 { font-size: clamp(26px, 8vw, 44px); }
        }

        /* Горизонтальный футер только для широких экранов */
        @media (min-width: 1025px) {
            .footer-steps {
                justify-content: center;
                gap: 60px;
            }
        }
    </style>
</head>
<body>

    <section class="hero">
        <div class="hero-bg"></div>
        <div class="overlay"></div>
        
        <nav class="top-nav">
            <div class="logo">KIM<span>PRO</span>MEBEL</div>
            <a href="tel:+380675867998" class="phone-block">
                <div class="phone-number">(+38) 067 586 79 98</div>
                <div class="phone-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                </div>
            </a>
        </nav>

        <div class="content">
            <h1>Эксклюзивные <b>КУХНИ</b> <span>PRO</span> уровня</h1>
            <div class="description">
                Индивидуальное проектирование и деталировка. <br>
                Создаем техническую базу для безупречного производства.
            </div>
            <a href="https://t.me/mihailkuvila" target="_blank" class="btn">Заказать проект</a>
        </div>

        <div class="footer-steps">
            <div class="step"><div class="dot"></div><span>1. Создаём 3д проект</span></div>
            <div class="step"><div class="dot"></div><span>2. Готовим документы</span></div>
            <div class="step"><div class="dot"></div><span>3. Отправляем на производство</span></div>
        </div>
    </section>

</body>
</html>
