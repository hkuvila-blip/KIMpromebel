<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KIMPROMEBEL | Exclusive Design (V7.8)</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;200;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/css/intlTelInput.css">

    <style>
        :root { --gold: #f2c94c; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { 
            width: 100%; background: #000; 
            font-family: 'Montserrat', sans-serif; color: white; 
            overflow-x: hidden; min-height: 100vh;
        }

        .hero {
            min-height: 100vh; width: 100%;
            display: flex; flex-direction: column;
            position: relative; padding: 40px 8%;
            justify-content: space-between;
        }

        .hero-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://github.com/user-attachments/assets/7162f987-ebc5-4a1c-808b-ffa029dc14d5');
            background-size: cover; background-position: center;
            z-index: 1; opacity: 0.9; transform: scaleX(-1); 
        }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, rgba(13,13,15,1) 0%, rgba(13,13,15,0.9) 20%, rgba(13,13,15,0.6) 50%, rgba(13,13,15,0.3) 100%);
            z-index: 2;
        }

        /* --- HEADER & PHONE --- */
        .top-nav {
            position: relative; display: flex; justify-content: space-between; 
            align-items: center; z-index: 100; width: 100%;
        }
        .logo { font-weight: 900; font-size: clamp(22px, 3vw, 30px); text-transform: uppercase; letter-spacing: 1.5px; }
        .logo span { color: var(--gold); }

        .phone-block { 
            position: relative; display: flex; align-items: center; text-decoration: none; color: white; 
            background: rgba(0,0,0,0.5); padding: 8px 70px 8px 25px; border-radius: 40px;
            backdrop-filter: blur(8px); border: 1px solid rgba(242,201,76,0.15);
        }
        .phone-number { font-size: clamp(18px, 2.2vw, 24px); font-weight: 500; }
        .phone-icon {
            position: absolute; right: -5px; top: 50%; transform: translateY(-50%);
            width: 60px; height: 60px; border: 2px solid var(--gold); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; color: var(--gold);
            background: #000; box-shadow: 0 5px 20px rgba(0, 0, 0, 0.8); z-index: 2;
        }
        .phone-icon svg { width: 26px; height: 26px; }

        /* --- CONTENT --- */
        .content { 
            position: relative; z-index: 10; 
            display: flex; flex-direction: row; align-items: center;
            justify-content: space-between; gap: 40px; 
            width: 100%; margin: auto 0; padding: 40px 0;
        }

        .text-block { max-width: 750px; display: flex; flex-direction: column; gap: 45px; }
        h1 { font-size: clamp(34px, 5.8vw, 85px); font-weight: 200; line-height: 1.1; text-transform: uppercase; }
        h1 b { font-weight: 900; display: block; } 
        h1 span { color: var(--gold); }

        .btn-main {
            display: block; width: 100%; max-width: 320px; 
            padding: 20px 30px; border: 2px solid var(--gold);
            color: #fff; text-decoration: none; text-transform: uppercase; 
            font-weight: 400; font-size: 18px; letter-spacing: 3px; 
            background: rgba(13, 13, 15, 0.6); text-align: center;
            cursor: pointer; transition: 0.3s; backdrop-filter: blur(5px);
        }

        /* --- ТАЙМЕР --- */
        .timer-wrapper { display: flex; flex-direction: column; align-items: center; gap: 25px; }
        .timer-container { position: relative; width: clamp(230px, 26vw, 380px); height: clamp(230px, 26vw, 380px); }
        .timer-svg { transform: rotate(-90deg); width: 100%; height: 100%; }
        .timer-progress { fill: none; stroke: var(--gold); stroke-width: 1; transition: stroke-dashoffset 1s linear; }
        .timer-number { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: clamp(80px, 9vw, 130px); font-weight: 100; color: var(--gold); }
        .timer-cta { font-size: clamp(16px, 1.8vw, 22px); text-transform: uppercase; color: var(--gold); letter-spacing: 2px; text-align: center; }

        /* --- FOOTER --- */
        .footer-steps { display: flex; gap: 50px; justify-content: center; z-index: 50; padding-bottom: 30px;}
        .step { display: flex; align-items: center; gap: 12px; }
        .dot { width: 10px; height: 10px; background: var(--gold); border-radius: 50%; box-shadow: 0 0 10px var(--gold); }
        .step span { font-size: 1.3rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; }

        /* --- МОДАЛЬНОЕ ОКНО --- */
        .modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(15px); }
        .modal-content { background: #0d0d0f; border: 1px solid var(--gold); margin: 12vh auto; padding: 40px 30px; width: 92%; max-width: 420px; text-align: center; position: relative; }
        .modal-title { color: white; text-transform: uppercase; font-size: 18px; margin-bottom: 25px; font-weight: 700; }
        .modal-input, .iti { width: 100% !important; margin-bottom: 15px; }
        .modal-input, .iti input { height: 55px !important; background: transparent !important; border: 1px solid rgba(242, 201, 76, 0.4) !important; color: #fff !important; font-size: 16px !important; padding: 0 15px !important; width: 100%; border-radius: 0; }
        .iti--separate-dial-code input { padding-left: 95px !important; }
        .modal-btn { width: 100%; height: 55px; background: var(--gold); border: none; font-weight: 900; font-size: 18px; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; color: #000; }
        .close-modal { position: absolute; top: 10px; right: 15px; font-size: 30px; color: var(--gold); cursor: pointer; }

        /* СТИЛЬ ОШИБКИ */
        .error-hint { color: #ff4d4d; font-size: 13px; margin-top: 10px; display: none; font-weight: 400; letter-spacing: 1px; }

        #success-message { display: none; padding: 20px 0; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        @media (max-width: 1024px) { .content { flex-direction: column; text-align: center; } .btn-main { margin: 0 auto; } }
        @media (max-width: 768px) {
            .top-nav { flex-direction: column; gap: 30px; }
            .phone-number { display: none; }
            .phone-icon { position: relative; right: auto; top: auto; transform: none; width: 85px; height: 85px; }
            .phone-block { padding: 0; background: transparent; border: none; }
            .footer-steps { flex-direction: column; gap: 20px; margin: 0 auto; align-items: center; text-align: center; }
        }
    </style>
</head>
<body>

    <section class="hero">
        <div class="hero-bg"></div>
        <div class="overlay"></div>
        
        <nav class="top-nav">
            <div class="logo">KIM<span>PRO</span>MEBEL</div>
            <a href="tel:+380675867998" class="phone-block">
                <div class="phone-number">Позвонить сейчас</div>
                <div class="phone-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                </div>
            </a>
        </nav>

        <div class="content">
            <div class="text-block">
                <h1>Эксклюзивные <b>КУХНИ</b> <span>PRO</span> уровня</h1>
                <div class="btn-main" onclick="openModal()">Заказать проект</div>
            </div>

            <div class="timer-wrapper">
                <div class="timer-container">
                    <svg class="timer-svg" viewBox="0 0 100 100">
                        <circle id="progress-line" class="timer-progress" cx="50" cy="50" r="45"></circle>
                    </svg>
                    <div id="timer-num" class="timer-number">5</div>
                </div>
                <div class="timer-cta">Оставь заявку — получи скидку</div>
            </div>
        </div>

        <div class="footer-steps">
            <div class="step"><div class="dot"></div><span>Проект</span></div>
            <div class="step"><div class="dot"></div><span>Документы</span></div>
            <div class="step"><div class="dot"></div><span>Производство</span></div>
        </div>
    </section>

    <div id="callback-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            
            <div id="form-container">
                <div class="modal-title">Введите данные</div>
                <input type="text" id="userName" class="modal-input" placeholder="Имя">
                <div class="iti"><input type="tel" id="phoneInput"></div>
                <button id="sendFormBtn" class="modal-btn">ОТПРАВИТЬ</button>
                <div id="error-message" class="error-hint">Проверьте заполненные данные</div>
            </div>

            <div id="success-message">
                <div style="font-size: 60px; color: var(--gold); margin-bottom: 15px;">✓</div>
                <div class="modal-title">Заявка принята!</div>
                <p style="color: rgba(255,255,255,0.7); font-size: 14px; line-height: 1.5;">
                    Михаил Васильевич, спасибо!<br>Мы уже получили ваше сообщение.
                </p>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/js/intlTelInput.min.js"></script>
    <script>
        const phoneElem = document.querySelector("#phoneInput");
        const iti = window.intlTelInput(phoneElem, { 
            initialCountry: "ua", 
            separateDialCode: true, 
            utilsScript: "https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/js/utils.js" 
        });

        const timerNum = document.getElementById('timer-num');
        const progressLine = document.getElementById('progress-line');
        const totalTime = 5;
        let timeLeft = totalTime;
        const circumference = 2 * Math.PI * 45;
        progressLine.style.strokeDasharray = circumference;
        progressLine.style.strokeDashoffset = 0;

        function openModal() { document.getElementById('callback-modal').style.display = 'block'; }
        function closeModal() { 
            document.getElementById('callback-modal').style.display = 'none';
            setTimeout(() => {
                document.getElementById('form-container').style.display = 'block';
                document.getElementById('success-message').style.display = 'none';
                document.getElementById('error-message').style.display = 'none';
            }, 500);
        }

        setTimeout(() => {
            const countdown = setInterval(() => {
                timeLeft--;
                if (timeLeft >= 0) {
                    timerNum.textContent = timeLeft;
                    progressLine.style.strokeDashoffset = circumference - (timeLeft / totalTime) * circumference;
                } 
                
                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    timerNum.textContent = ""; 
                    progressLine.style.strokeDashoffset = circumference;
                    openModal();
                }
            }, 1000);
        }, 1000);

        document.getElementById('sendFormBtn').addEventListener('click', function() {
            const nameVal = document.getElementById('userName').value;
            const errorElem = document.getElementById('error-message');
            const btn = this;

            // Скрываем ошибку перед новой проверкой
            errorElem.style.display = 'none';

            if (nameVal.trim() === "" || !iti.isValidNumber()) {
                // Вместо alert показываем стильный текст ошибки
                errorElem.style.display = 'block';
                return;
            }

            btn.textContent = "ОТПРАВКА...";
            btn.disabled = true;

            fetch('https://formspree.io/f/maqpvnvp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                body: JSON.stringify({ name: nameVal, phone: iti.getNumber() })
            })
            .then(res => {
                if (res.ok) {
                    document.getElementById('form-container').style.display = 'none';
                    document.getElementById('success-message').style.display = 'block';
                    setTimeout(closeModal, 4000);
                } else { 
                    errorElem.textContent = "Ошибка сервера. Попробуйте позже.";
                    errorElem.style.display = 'block';
                    btn.textContent = "ОТПРАВИТЬ";
                    btn.disabled = false;
                }
            })
            .catch(() => {
                errorElem.textContent = "Проверьте интернет-соединение.";
                errorElem.style.display = 'block';
                btn.textContent = "ОТПРАВИТЬ";
                btn.disabled = false;
            });
        });
    </script>
</body>
</html>
