<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIMPROMEBEL | Exclusive Design</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #f2c94c;
            --dark: #0d0d0f;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            height: 100%; width: 100%; 
            background: var(--dark); 
            font-family: 'Montserrat', sans-serif; 
            color: white; 
            overflow-x: hidden;
        }

        .hero {
            height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            position: relative;
            padding: 0 8%;
        }

        .hero-bg {
            position: absolute;
            top: 0; right: 0;
            width: 80%;
            height: 100%;
            background-image: url('https://github.com/user-attachments/assets/7162f987-ebc5-4a1c-808b-ffa029dc14d5');
            background-size: cover;
            background-position: center;
            z-index: 1;
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, 
                rgba(13, 13, 15, 0.98) 15%, 
                rgba(13, 13, 15, 0.6) 50%, 
                rgba(13, 13, 15, 0.2) 100%
            );
            backdrop-filter: blur(1px);
            z-index: 2;
        }

        .content { 
            position: relative; 
            z-index: 10; 
            max-width: 900px;
            animation: fadeInUp 1s ease-out forwards; 
        }

        h1 {
            font-size: clamp(38px, 8vw, 95px);
            font-weight: 200;
            line-height: 1;
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        h1 b { font-weight: 900; display: block; }
        h1 span { color: var(--gold); }

        .description {
            font-size: clamp(16px, 2vw, 22px);
            font-weight: 400;
            line-height: 1.6;
            color: rgba(255,255,255,0.85);
            max-width: 550px;
            margin-bottom: 50px;
            border-left: 4px solid var(--gold);
            padding-left: 25px;
        }

        .btn {
            padding: 22px 50px;
            border: 1px solid var(--gold);
            color: white;
            text-decoration: none;
            text-transform: uppercase;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 2px;
            transition: 0.3s;
            background: rgba(242, 201, 76, 0.1);
            display: inline-block;
            margin-bottom: 60px; /* Отступ от кнопки до надписей ниже */
        }

        .btn:hover { background: var(--gold); color: black; box-shadow: 0 0 20px rgba(242, 201, 76, 0.4); }

        /* --- ИСПРАВЛЕННЫЙ БЛОК НАДПИСЕЙ --- */
        .steps-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
            animation: fadeInUp 1.3s ease-out forwards;
        }

        .step-item { 
            display: flex; 
            align-items: center; 
            gap: 15px;
        }

        .dot-marker { 
            width: 12px; height: 12px; 
            background-color: var(--gold); 
            border-radius: 50%; 
            box-shadow: 0 0 12px var(--gold);
        }
        
        .step-text { 
            font-size: clamp(16px, 1.5vw, 20px); /* Увеличенный, адаптивный шрифт */
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            color: #fff;
            white-space: nowrap;
        }

        /* ТЕЛЕФОН И ЛОГО */
        header { position: absolute; top: 40px; left: 8%; z-index: 100; }
        .logo { font-weight: 900; font-size: 24px; letter-spacing: 2px; }
        .logo span { color: var(--gold); }

        .phone-block {
            position: absolute;
            top: 40px; right: 8%;
            z-index: 100;
            display: flex; align-items: center; gap: 15px;
            text-decoration: none; color: white;
        }

        .phone-icon {
            width: 45px; height: 45px;
            border: 1px solid var(--gold);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: var(--gold); font-size: 18px;
        }

        /* МОБИЛЬНАЯ ВЕРСИЯ */
        @media (max-width: 768px) {
            .hero { padding: 0 5%; justify-content: center; text-align: center; }
            .hero-bg { width: 100%; opacity: 0.4; }
            .overlay { background: rgba(13, 13, 15, 0.85); }

            .description { border-left: none; padding-left: 0; margin: 0 auto 40px; }
            
            .btn { margin-bottom: 40px; width: 100%; }

            .steps-bar { 
                flex-direction: column; 
                align-items: flex-start;
                display: inline-flex;
                gap: 20px;
            }

            .step-text { font-size: 16px; }
            .phone-number { display: none; }
        }

    </style>
</head>
<body>

    <header>
        <div class="logo">KIM<span>PRO</span>MEBEL</div>
    </header>

    <a href="tel:+380675867998" class="phone-block">
        <div class="phone-icon">📞</div>
        <div class="phone-number"><span>(+38)</span> 067 586 79 98</div>
    </a>

    <section class="hero">
        <div class="hero-bg"></div>
        <div class="overlay"></div>
        
        <div class="content">
            <h1>Эксклюзивные <b>КУХНИ</b> <span>PRO</span> уровня</h1>
            <div class="description">
                Индивидуальное проектирование и деталировка. 
                Создаем техническую базу для безупречного производства.
            </div>
            
            <a href="https://t.me/mihailkuvila" target="_blank" class="btn">Заказать проект</a>

            <div class="steps-bar">
                <div class="step-item"><div class="dot-marker"></div><span class="step-text">создаем 3д проект</span></div>
                <div class="step-item"><div class="dot-marker"></div><span class="step-text">готовим тех. часть</span></div>
                <div class="step-item"><div class="dot-marker"></div><span class="step-text">отправляем в цех</span></div>
            </div>
        </div>
    </section>

</body>
</html>
