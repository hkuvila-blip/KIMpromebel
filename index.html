<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIMpromebel | Проектирование кухонь</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; width: 100%; background: #000; font-family: sans-serif; }

        .hero {
            height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            
            /* ПРОЗРАЧНАЯ ТОНИРОВКА + ТВОЯ КУХНЯ */
            background: 
                linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.4)), 
                url('hero.jpg'); 
            
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .content {
            text-align: center;
            color: white;
            z-index: 10;
        }

        h1 { font-size: 50px; text-transform: uppercase; margin-bottom: 20px; text-shadow: 2px 2px 10px #000; }
        h1 span { color: #f2c94c; }
        
        .btn {
            padding: 15px 30px;
            background: #f2c94c;
            color: #000;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <section class="hero">
        <div class="content">
            <h1>KIM<span>promebel</span></h1>
            <p style="margin-bottom: 30px; font-size: 20px;">Профессиональное проектирование кухонь</p>
            <a href="https://t.me/kimpromebel_pro" class="btn">Написать в Telegram</a>
        </div>
    </section>
</body>
</html>
