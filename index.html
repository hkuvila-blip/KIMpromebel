<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIMPROMEBEL | Exclusive Design</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #f2c94c;
            --dark: #0d0d0f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            height: 100%; width: 100%; 
            background: var(--dark); 
            font-family: 'Montserrat', sans-serif; 
            color: white; 
            overflow: hidden;
        }

        .hero {
            height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            position: relative;
            padding: 0 8%;
        }

        .hero-bg {
            position: absolute;
            top: 0; right: 0;
            width: 75%;
            height: 100%;
            background-image: url('https://github.com/user-attachments/assets/7162f987-ebc5-4a1c-808b-ffa029dc14d5');
            background-size: cover;
            background-position: center;
            z-index: 1;
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, 
                var(--dark) 25%, 
                rgba(13, 13, 15, 0.8) 50%, 
                rgba(13, 13, 15, 0.2) 100%
            );
            backdrop-filter: blur(2px);
            z-index: 2;
        }

        .content { position: relative; z-index: 10; max-width: 800px; }

        h1 {
            font-size: clamp(35px, 7vw, 85px);
            font-weight: 200;
            line-height: 1;
            text-transform: uppercase;
            margin-bottom: 25px;
        }

        h1 b { font-weight: 900; display: block; }
        h1 span { color: var(--gold); }

        .description {
            font-size: 16px;
            font-weight: 400;
            line-height: 1.7;
            color: rgba(255,255,255,0.5);
            max-width: 450px;
            margin-bottom: 40px;
            border-left: 1px solid var(--gold);
            padding-left: 25px;
        }

        .btn {
            padding: 20px 50px;
            border: 1px solid var(--gold);
            color: white;
            text-decoration: none;
            text-transform: uppercase;
            font-weight: 700;
            font-size: 12px;
            letter-spacing: 2px;
            transition: 0.4s;
            background: rgba(242, 201, 76, 0.05);
        }

        .btn:hover { background: var(--gold); color: black; transform: translateY(-3px); }

        /* НИЖНЯЯ ПАНЕЛЬ С УСЛОВИЯМИ */
        .steps-bar {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 40px;
            z-index: 20;
            width: auto;
            white-space: nowrap;
        }

        .step-item {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .dot-marker {
            width: 8px;
            height: 8px;
            background-color: var(--gold);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--gold); /* Эффект свечения */
        }

        .step-text {
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: rgba(255, 255, 255, 0.8);
        }

        header {
            position: absolute;
            top: 40px; left: 8%;
            z-index: 100;
            width: 84%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo { font-weight: 900; font-size: 20px; letter-spacing: 2px; }
        .logo span { color: var(--gold); }

    </style>
</head>
<body>

    <header>
        <div class="logo">KIM<span>PRO</span>MEBEL</div>
    </header>

    <section class="hero">
        <div class="hero-bg"></div>
        <div class="overlay"></div>
        
        <div class="content">
            <h1>Эксклюзивные <b>КУХНИ</b> <span>PRO</span> уровня</h1>
            <div class="description">
                Индивидуальное проектирование и деталировка. 
                Создаем техническую базу для безупречного производства.
            </div>
            <a href="https://t.me/kimpromebel_pro" target="_blank" class="btn">Заказать проект</a>
        </div>

        <div class="steps-bar">
            <div class="step-item">
                <div class="dot-marker"></div>
                <span class="step-text">создаем 3д проект</span>
            </div>
            <div class="step-item">
                <div class="dot-marker"></div>
                <span class="step-text">готовим техническую часть</span>
            </div>
            <div class="step-item">
                <div class="dot-marker"></div>
                <span class="step-text">отправляем на производство</span>
            </div>
        </div>
    </section>

</body>
</html>
