<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KIMPROMEBEL | Exclusive Design</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;200;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/css/intlTelInput.css">

    <style>
        :root {
            --gold: #f2c94c;
            --gold-soft: rgba(242, 201, 76, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { 
            width: 100%; background: #000; 
            font-family: 'Montserrat', sans-serif; color: white; 
            overflow-x: hidden; min-height: 100vh;
        }

        .hero {
            min-height: 100vh; width: 100%;
            display: flex; flex-direction: column;
            position: relative; padding: 40px 8%;
            justify-content: space-between;
        }

        .hero-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://github.com/user-attachments/assets/7162f987-ebc5-4a1c-808b-ffa029dc14d5');
            background-size: cover; background-position: center;
            z-index: 1; opacity: 0.95; transform: scaleX(-1); 
        }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, #0d0d0f 0%, #0d0d0f 25%, rgba(13, 13, 15, 0.7) 45%, rgba(13, 13, 15, 0) 100%);
            z-index: 2;
        }

        .top-nav {
            position: relative; display: flex; justify-content: space-between; 
            align-items: center; z-index: 100; width: 100%;
        }

        .logo { font-weight: 900; font-size: 24px; text-transform: uppercase; letter-spacing: 1px; }
        .logo span { color: var(--gold); }

        .content { 
            position: relative; z-index: 10; 
            display: flex; align-items: center;
            justify-content: space-between; gap: 40px; 
            width: 100%; margin: auto 0;
        }

        .text-block { max-width: 700px; display: flex; flex-direction: column; gap: 35px; }

        h1 { font-size: clamp(30px, 5.5vw, 85px); font-weight: 200; line-height: 1.1; text-transform: uppercase; }
        h1 b { font-weight: 900; display: block; letter-spacing: 0.05em; } 
        h1 span { color: var(--gold); }

        .btn-main {
            padding: 20px 50px; border: 1px solid var(--gold);
            color: white; text-decoration: none; text-transform: uppercase; font-weight: 700;
            font-size: 13px; letter-spacing: 2px; background: rgba(242, 201, 76, 0.05);
            display: inline-block; transition: 0.3s;
        }

        .timer-wrapper {
            display: flex; flex-direction: column; align-items: center;
            z-index: 90; gap: 20px; transition: opacity 0.5s ease;
        }

        .timer-container {
            position: relative; width: clamp(220px, 25vw, 360px); height: clamp(220px, 25vw, 360px);
        }

        .timer-progress {
            fill: none; stroke: var(--gold); stroke-width: 0.8;
            stroke-dasharray: 4, 6; transition: stroke-dashoffset 1s linear;
        }

        .timer-number {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: clamp(70px, 8vw, 120px); font-weight: 100; color: var(--gold);
        }

        /* --- МОДАЛЬНОЕ ОКНО --- */
        .modal { 
            display: none; position: fixed; z-index: 9999; 
            left: 0; top: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.98); backdrop-filter: blur(15px); 
        }

        .modal-content { 
            background: #0d0d0f; border: 0.8px solid var(--gold); 
            margin: 15vh auto; padding: 50px 40px; 
            width: 92%; max-width: 500px; text-align: center; 
            position: relative; display: flex; flex-direction: column; gap: 30px;
        }

        .modal-content h3 { 
            color: #fff; text-transform: uppercase; font-weight: 100; 
            letter-spacing: 1px; line-height: 1.4; font-size: 18px;
        }
        .modal-content h3 span { color: var(--gold); font-weight: 700; display: block; margin-top: 5px; }

        .modal-input {
            width: 100% !important; height: 60px; padding: 0 20px;
            background: rgba(255,255,255,0.03) !important;
            border: 1px solid rgba(242, 201, 76, 0.5) !important; 
            color: #fff !important; outline: none; font-size: 18px;
        }

        /* ИСПРАВЛЕНИЕ НАЕЗДА ЦИФР */
        .iti { width: 100%; }
        #phone { padding-left: 110px !important; }

        .modal-btn {
            width: 100%; padding: 25px 10px; background: var(--gold);
            color: #000; border: none; font-weight: 900; 
            text-transform: uppercase; cursor: pointer; 
            font-size: 26px; letter-spacing: 5px; transition: 0.4s;
        }
        .modal-btn:disabled { opacity: 0.8; }

        .close-modal { position: absolute; top: 15px; right: 20px; font-size: 35px; color: var(--gold); cursor: pointer; }
    </style>
</head>
<body>

    <section class="hero">
        <div class="hero-bg"></div>
        <div class="overlay"></div>
        
        <nav class="top-nav">
            <div class="logo">KIM<span>PRO</span>MEBEL</div>
        </nav>

        <div class="content">
            <div class="text-block">
                <h1>Эксклюзивные <b>КУХНИ</b> <span>PRO</span> уровня</h1>
                <a href="#" class="btn-main" onclick="openModal()">Заказать проект</a>
            </div>

            <div id="timer-wrapper" class="timer-wrapper">
                <div class="timer-container">
                    <svg viewBox="0 0 100 100" style="transform: rotate(-90deg); width:100%; height:100%;">
                        <circle id="progress" class="timer-progress" cx="50" cy="50" r="45"></circle>
                    </svg>
                    <div id="timer-num" class="timer-number">7</div>
                </div>
            </div>
        </div>
    </section>

    <div id="callback-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h3>ВВЕДИТЕ ИМЯ И ТЕЛЕФОН. <span>МЫ СВЯЖЕМСЯ С ВАМИ</span></h3>
            
            <input type="text" id="user-name" class="modal-input" placeholder="Имя">
            <input type="tel" id="phone" class="modal-input">
            
            <button class="modal-btn" onclick="submitForm()">ОТПРАВИТЬ</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/js/intlTelInput.min.js"></script>
    <script>
        const phoneInput = document.querySelector("#phone");
        const iti = window.intlTelInput(phoneInput, {
            initialCountry: "auto",
            geoIpLookup: (success) => fetch("https://ipapi.co/json").then(res => res.json()).then(data => success(data.country_code)).catch(() => success("UA")),
            utilsScript: "https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/js/utils.js",
            separateDialCode: true
        });

        const timerNum = document.getElementById('timer-num');
        const progress = document.getElementById('progress');
        const modal = document.getElementById('callback-modal');
        const circumference = 2 * Math.PI * 45;
        let current = 7; 

        progress.style.strokeDasharray = circumference;
        
        const interval = setInterval(() => {
            if (current >= 0) {
                timerNum.textContent = current;
                progress.style.strokeDashoffset = circumference - (current / 7) * circumference;
                current--;
            } else {
                clearInterval(interval);
                document.getElementById('timer-wrapper').style.display = 'none';
                openModal();
            }
        }, 1000);

        function openModal() { modal.style.display = 'block'; }
        function closeModal() { modal.style.display = 'none'; }

        function submitForm() {
            const name = document.getElementById('user-name').value;
            const phone = iti.getNumber();
            const btn = document.querySelector('.modal-btn');

            if (name && iti.isValidNumber()) {
                btn.textContent = "ОТПРАВКА...";
                btn.disabled = true;

                fetch('https://formspree.io/f/maqpvnvp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, phone })
                }).then(() => {
                    btn.textContent = "ГОТОВО!";
                    setTimeout(closeModal, 2000);
                });
            } else { alert("Заполните поля корректно"); }
        }
    </script>
</body>
</html>
