<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIMpromebel | Проектирование кухонь</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #f2c94c; --dark: #1e2229; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background: #000; color: #fff; }

        header {
            position: fixed; width: 100%; padding: 20px 8%;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(10px); z-index: 1000;
        }
        .logo { font-weight: 800; font-size: 24px; text-transform: uppercase; }
        .logo span { color: var(--primary); }

        /* ИСПРАВЛЕННЫЙ БЛОК С ПРОЗРАЧНОЙ ТОНИРОВКОЙ */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            padding: 0 8%;
            /* Мы убрали тяжелые заливки. Теперь тут только легкий градиент */
            background: 
                linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.5)), 
                url('hero.jpg') no-repeat center center;
            background-size: cover;
        }

        .hero-content { max-width: 800px; z-index: 5; }
        h1 { font-size: clamp(30px, 6vw, 60px); font-weight: 800; text-transform: uppercase; margin-bottom: 20px; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); }
        h1 span { color: var(--primary); }
        p { font-size: 18px; margin-bottom: 30px; text-shadow: 1px 1px 5px rgba(0,0,0,0.8); }

        .btn { 
            padding: 15px 35px; background: var(--primary); color: #000; 
            text-decoration: none; font-weight: 800; text-transform: uppercase;
            display: inline-block; transition: 0.3s;
        }
        .btn:hover { background: #fff; }
    </style>
</head>
<body>
    <header><div class="logo">KIM<span>promebel</span></div></header>
    <section class="hero">
        <div class="hero-content">
            <h1>Проектирование <span>кухонь</span></h1>
            <p>Техническая документация и 3D-визуализация от KIMpromebel.</p>
            <a href="https://t.me/kimpromebel_pro" class="btn">Написать мне</a>
        </div>
    </section>
</body>
</html>
