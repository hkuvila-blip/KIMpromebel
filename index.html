<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIMPROMEBEL | Профессиональное проектирование</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; width: 100%; background: #1a1d23; font-family: 'Montserrat', sans-serif; color: white; }

        .hero {
            height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            padding: 0 10%;
            position: relative;
            
            /* ТОНИРОВКА + ПРЯМАЯ ССЫЛКА ИЗ ТВОЕГО СКРИНШОТА */
            background: 
                linear-gradient(90deg, rgba(26, 29, 35, 0.8) 20%, rgba(26, 29, 35, 0.2) 100%),
                url('https://github.com/user-attachments/assets/02702cad-be75-4818-933e-8227e3ba00e9');
            
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .content { z-index: 10; max-width: 900px; }

        h1 { 
            font-size: clamp(35px, 8vw, 75px); 
            font-weight: 900; 
            text-transform: uppercase; 
            line-height: 0.95; 
            margin-bottom: 25px; 
            letter-spacing: -1px;
        }
        
        h1 span { color: #f2c94c; }

        p { 
            font-size: clamp(16px, 2vw, 22px); 
            margin-bottom: 40px; 
            color: #d1d5db; 
            max-width: 550px; 
            font-weight: 400;
        }
        
        .btn {
            padding: 20px 50px; 
            background: #f2c94c; 
            color: #000;
            text-decoration: none; 
            font-weight: 800; 
            text-transform: uppercase;
            display: inline-block; 
            transition: 0.3s ease;
        }

        .btn:hover { background: #ffffff; transform: translateY(-5px); }

        .logo-top {
            position: absolute;
            top: 40px;
            left: 10%;
            font-weight: 900;
            font-size: 20px;
            letter-spacing: 2px;
        }
        .logo-top span { color: #f2c94c; }

    </style>
</head>
<body>

    <div class="logo-top">KIM<span>PROMEBEL</span></div>

    <section class="hero">
        <div class="content">
            <h1>ПРОЕКТИРОВАНИЕ <br><span>КУХОНЬ</span> ДЛЯ <br>ПРОИЗВОДСТВА</h1>
            <p>Конструкторская документация, чертежи и 3D-визуализация. Исключаю ошибки при сборке и экономлю ваше время.</p>
            <a href="https://t.me/kimpromebel_pro" target="_blank" class="btn">Обсудить проект</a>
        </div>
    </section>

</body>
</html>
