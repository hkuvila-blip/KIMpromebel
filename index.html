<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIMPROMEBEL | Проектирование</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            height: 100%; width: 100%; 
            background: #0a0a0c; 
            font-family: 'Montserrat', sans-serif; 
            font-weight: 500; /* Medium 500 */
            overflow: hidden; 
            color: white; 
        }

        .hero {
            height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            padding: 0 10%;
            position: relative;
            overflow: hidden; 
        }

        /* ФОНОВАЯ КАРТИНКА (ПРЯМАЯ ССЫЛКА) */
        .hero::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            /* ИСПОЛЬЗУЕМ ВАШУ ПРЯМУЮ ССЫЛКУ ИЗ АССЕТОВ */
            background-image: url('https://github.com/user-attachments/assets/7162f987-ebc5-4a1c-808b-ffa029dc14d5'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 1;
        }

        /* ГЛЯНЦЕВОЕ ГЛУБОКОЕ ЗАТЕМНЕНИЕ */
        .hero::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            /* Градиент: слева глубокий антрацит, справа прозрачность */
            background: linear-gradient(90deg, 
                rgba(10, 10, 12, 0.98) 15%, 
                rgba(10, 10, 12, 0.7) 50%, 
                rgba(10, 10, 12, 0.1) 100%
            );
            /* Эффект глянцевого стекла (блюр) */
            backdrop-filter: blur(4px); 
            z-index: 2;
        }

        .content { z-index: 10; max-width: 900px; position: relative; }

        h1 { 
            font-size: clamp(30px, 7vw, 72px); 
            font-weight: 900; /* Заголовок жирный для стиля */
            text-transform: uppercase; 
            line-height: 0.95; 
            margin-bottom: 25px; 
            letter-spacing: -2px;
        }
        
        h1 span { color: #f2c94c; }

        p { 
            font-size: clamp(16px, 2vw, 20px); 
            margin-bottom: 40px; 
            color: #efefef; 
            max-width: 550px; 
            line-height: 1.6;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        
        .btn {
            padding: 20px 50px; 
            background: #f2c94c; 
            color: #000;
            text-decoration: none; 
            font-weight: 700; 
            text-transform: uppercase;
            display: inline-block; 
            letter-spacing: 1px;
            transition: 0.3s ease;
        }

        .btn:hover { 
            background: #ffffff; 
            transform: translateY(-5px); 
        }

        .logo-top {
            position: absolute;
            top: 40px;
            left: 10%;
            font-weight: 900;
            font-size: 22px;
            z-index: 100;
            text-transform: uppercase;
        }
        .logo-top span { color: #f2c94c; }

    </style>
</head>
<body>

    <div class="logo-top">KIM<span>PROMEBEL</span></div>

    <section class="hero">
        <div class="content">
            <h1>ПРОЕКТИРОВАНИЕ <br><span>КУХОНЬ</span> ДЛЯ <br>ПРОИЗВОДСТВА</h1>
            <p>Конструкторская документация, чертежи и 3D-визуализация. Технически безупречные проекты за 2-3 дня.</p>
            <a href="https://t.me/kimpromebel_pro" target="_blank" class="btn">Заказать проект</a>
        </div>
    </section>

</body>
</html>
