<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KIMPROMEBEL | Exclusive Design</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;200;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/css/intlTelInput.css">

    <style>
        :root {
            --gold: #f2c94c;
            --gold-soft: rgba(242, 201, 76, 0.08);
            --pure-black: #0d0d0f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { 
            width: 100%; background: #000; 
            font-family: 'Montserrat', sans-serif; color: white; 
            overflow-x: hidden; min-height: 100vh;
        }

        .hero {
            min-height: 100vh; width: 100%;
            display: flex; flex-direction: column;
            position: relative; padding: 40px 8%;
            justify-content: space-between;
        }

        .hero-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://github.com/user-attachments/assets/7162f987-ebc5-4a1c-808b-ffa029dc14d5');
            background-size: cover; background-position: center;
            z-index: 1; opacity: 0.95; filter: contrast(1.15);
            transform: scaleX(-1); 
        }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 5% 20%, var(--gold-soft) 0%, transparent 40%),
                linear-gradient(90deg, #0d0d0f 0%, #0d0d0f 25%, rgba(13, 13, 15, 0.7) 45%, rgba(13, 13, 15, 0) 100%);
            z-index: 2;
        }

        .top-nav {
            position: relative; display: flex; justify-content: space-between; 
            align-items: center; z-index: 100; width: 100%;
        }

        .logo { font-weight: 900; font-size: 24px; text-transform: uppercase; letter-spacing: 1px; }
        .logo span { color: var(--gold); }

        .phone-block { display: flex; align-items: center; gap: 12px; text-decoration: none; color: white; }
        .phone-icon {
            width: 45px; height: 45px; border: 1.5px solid var(--gold); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; color: var(--gold);
            transition: 0.3s;
        }

        .content { 
            position: relative; z-index: 10; 
            display: flex; flex-direction: row; align-items: center;
            justify-content: space-between; gap: 40px; 
            width: 100%; margin: auto 0;
            padding: 60px 0;
        }

        .text-block { max-width: 700px; display: flex; flex-direction: column; gap: 35px; }

        h1 { font-size: clamp(30px, 5.5vw, 85px); font-weight: 200; line-height: 1.1; text-transform: uppercase; }
        h1 b { font-weight: 900; display: block; letter-spacing: 0.05em; margin: 5px 0; } 
        h1 span { color: var(--gold); }

        .description {
            font-size: clamp(16px, 1.8vw, 22px); font-weight: 400; line-height: 1.5;
            color: rgba(255,255,255,0.85); border-left: 3px solid var(--gold); padding-left: 20px;
        }

        .btn-main {
            padding: 20px 50px; border: 1px solid var(--gold);
            color: white; text-decoration: none; text-transform: uppercase; font-weight: 700;
            font-size: 13px; letter-spacing: 2px; background: rgba(242, 201, 76, 0.05);
            display: inline-block; transition: 0.3s; align-self: flex-start;
        }

        .timer-wrapper {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 90; gap: 20px; flex-shrink: 0; transition: opacity 0.5s ease;
        }

        .timer-container {
            position: relative; width: clamp(220px, 25vw, 360px); height: clamp(220px, 25vw, 360px);
        }

        .timer-svg { transform: rotate(-90deg); width: 100%; height: 100%; }
        .timer-background { fill: none; stroke: transparent; }
        .timer-progress {
            fill: none; stroke: var(--gold); stroke-width: 0.8;
            stroke-dasharray: 4, 6; stroke-linecap: round;
            transition: stroke-dashoffset 1s linear;
        }

        .timer-number {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: clamp(70px, 8vw, 120px); font-weight: 100; color: var(--gold); letter-spacing: -3px;
        }

        .timer-cta { font-size: 11px; text-transform: uppercase; color: var(--gold); letter-spacing: 3px; opacity: 0.8; }

        .footer-steps { 
            position: relative; display: flex; z-index: 50; width: 100%;
            gap: 40px; justify-content: center; padding-bottom: 20px;
        }

        .step { display: flex; align-items: center; gap: 10px; }
        .dot { width: 8px; height: 8px; background: var(--gold); border-radius: 50%; }
        .step span { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; opacity: 0.7; }

        /* --- МОДАЛЬНОЕ ОКНО --- */
        .modal { 
            display: none; position: fixed; z-index: 9999; 
            left: 0; top: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.98); backdrop-filter: blur(15px); 
        }

        .modal-content { 
            background: #0d0d0f; border: 0.8px solid var(--gold); 
            margin: 12vh auto; padding: 60px 40px; 
            width: 92%; max-width: 550px; text-align: center; 
            position: relative;
            display: flex; flex-direction: column; gap: 35px;
            box-shadow: 0 0 80px rgba(242, 201, 76, 0.1);
        }

        .modal-content h3 { 
            color: #fff; text-transform: uppercase; font-weight: 200; 
            letter-spacing: 2px; line-height: 1.4; font-size: clamp(18px, 4vw, 24px);
        }
        .modal-content h3 span { color: var(--gold); font-weight: 700; }

        .iti { width: 100%; }
        .modal-input {
            width: 100%; padding: 22px 20px 22px 52px !important; 
            background: rgba(255,255,255,0.03) !important;
            border: 1px solid rgba(242, 201, 76, 0.5) !important; 
            color: #fff !important; border-radius: 0 !important; 
            outline: none; font-size: 18px;
        }

        .modal-btn {
            width: 100%; padding: 25px 10px; background: var(--gold);
            color: #000; border: none; font-weight: 900; 
            text-transform: uppercase; cursor: pointer; 
            font-size: clamp(20px, 6vw, 32px);
            letter-spacing: 4px; transition: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        .modal-btn:disabled { opacity: 0.8; cursor: not-allowed; }

        .close-modal { position: absolute; top: 15px; right: 20px; font-size: 35px; color: var(--gold); cursor: pointer; opacity: 0.5; }

        @media (max-width: 1024px) {
            .phone-number { display: none; }
            .hero { padding: 30px 5%; }
            .content { flex-direction: column; text-align: center; margin-top: 50px; gap: 60px; }
            .text-block { align-items: center; }
            .description { border-left: none; border-top: 1px solid var(--gold); padding: 20px 0 0 0; }
            .btn-main { align-self: center; }
            .footer-steps { flex-direction: column; align-items: center; gap: 15px; }
        }

        @media (max-width: 480px) {
            .logo { font-size: 18px; }
            .modal-content { padding: 40px 20px; gap: 25px; }
            .modal-btn { font-size: 24px; padding: 18px 5px; }
            .timer-container { width: 190px; height: 190px; }
        }
    </style>
</head>
<body>

    <section class="hero">
        <div class="hero-bg"></div>
        <div class="overlay"></div>
        
        <nav class="top-nav">
            <div class="logo">KIM<span>PRO</span>MEBEL</div>
            <a href="tel:+380675867998" class="phone-block">
                <div class="phone-number">(+38) 067 586 79 98</div>
                <div class="phone-icon">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                </div>
            </a>
        </nav>

        <div class="content">
            <div class="text-block">
                <h1>Эксклюзивные <b>КУХНИ</b> <span>PRO</span> уровня</h1>
                <div class="description">
                    Индивидуальное проектирование и деталировка. <br>
                    Создаем техническую базу для безупречного производства.
                </div>
                <a href="https://t.me/mihailkuvila" target="_blank" class="btn-main">Заказать проект</a>
            </div>

            <div id="timer-wrapper" class="timer-wrapper">
                <div class="timer-container">
                    <svg class="timer-svg" viewBox="0 0 100 100">
                        <circle class="timer-background" cx="50" cy="50" r="45"></circle>
                        <circle id="progress" class="timer-progress" cx="50" cy="50" r="45"></circle>
                    </svg>
                    <div id="timer-num" class="timer-number">7</div>
                </div>
                <div class="timer-cta">Оставь заявку — получи скидку</div>
            </div>
        </div>

        <div class="footer-steps">
            <div class="step"><div class="dot"></div><span>Проект</span></div>
            <div class="step"><div class="dot"></div><span>Документы</span></div>
            <div class="step"><div class="dot"></div><span>Производство</span></div>
        </div>
    </section>

    <div id="callback-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h3>Напишите Ваш номер — <br><span>мы свяжемся с Вами</span></h3>
            <div class="input-holder"><input type="tel" id="phone" class="modal-input"></div>
            <button class="modal-btn" onclick="submitForm()">ОТПРАВИТЬ</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/js/intlTelInput.min.js"></script>
    <script>
        const phoneInput = document.querySelector("#phone");
        const iti = window.intlTelInput(phoneInput, {
            initialCountry: "auto",
            geoIpLookup: (success) => fetch("https://ipapi.co/json").then(res => res.json()).then(data => success(data.country_code)).catch(() => success("UA")),
            utilsScript: "https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/js/utils.js",
            separateDialCode: true
        });

        const timerNum = document.getElementById('timer-num');
        const progress = document.getElementById('progress');
        const modal = document.getElementById('callback-modal');
        const timerWrapper = document.getElementById('timer-wrapper');
        const circumference = 2 * Math.PI * 45;
        let current = 7; 

        progress.style.strokeDasharray = circumference;
        
        const interval = setInterval(() => {
            if (current >= 0) {
                timerNum.textContent = current;
                progress.style.strokeDashoffset = circumference - (current / 7) * circumference;
                current--;
            } else {
                clearInterval(interval);
                timerWrapper.style.opacity = '0'; 
                setTimeout(() => {
                    timerWrapper.style.display = 'none';
                    modal.style.display = 'block'; 
                }, 500);
            }
        }, 1000);

        function closeModal() { modal.style.display = 'none'; }

        // ЭТОТ БЛОК ОТПРАВЛЯЕТ ДАННЫЕ НА FORMSPREE
        function submitForm() {
            if (iti.isValidNumber()) {
                const fullNumber = iti.getNumber();
                const btn = document.querySelector('.modal-btn');
                
                // ВАША ССЫЛКА FORMSPREE
                const formspreeEndpoint = 'https://formspree.io/f/maqpvnvp';

                btn.textContent = "ОТПРАВКА...";
                btn.disabled = true;

                fetch(formspreeEndpoint, {
                    method: 'POST',
                    headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        phone: fullNumber, 
                        info: "Заявка с сайта КИМПРОМЕБЕЛЬ" 
                    })
                })
                .then(response => {
                    if (response.ok) {
                        btn.textContent = "ГОТОВО!";
                        btn.style.background = "#27ae60"; 
                        setTimeout(() => {
                            closeModal();
                            btn.textContent = "ОТПРАВИТЬ";
                            btn.style.background = "";
                            btn.disabled = false;
                        }, 2000);
                    } else { throw new Error(); }
                })
                .catch(() => {
                    alert("Ошибка отправки. Попробуйте еще раз.");
                    btn.textContent = "ОТПРАВИТЬ";
                    btn.disabled = false;
                });
            } else { alert("Введите корректный номер."); }
        }

        window.onclick = (e) => { if (e.target == modal) closeModal(); }
    </script>
</body>
</html>
