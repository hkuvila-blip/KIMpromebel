<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIMpromebel | Профессиональное проектирование</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; width: 100%; background: #000; font-family: 'Montserrat', sans-serif; }

        .hero {
            height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            padding: 0 8%;
            /* ТОНИРОВКА: максимально прозрачная (0.3), чтобы фото кухни было главным */
            background: 
                linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.4)), 
                url('top.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .content { color: white; z-index: 10; max-width: 800px; }
        h1 { font-size: clamp(30px, 6vw, 60px); text-transform: uppercase; font-weight: 800; margin-bottom: 20px; text-shadow: 2px 2px 10px rgba(0,0,0,0.7); }
        h1 span { color: #f2c94c; }
        p { font-size: clamp(16px, 2vw, 20px); margin-bottom: 30px; color: #fff; text-shadow: 1px 1px 5px rgba(0,0,0,0.7); }
        
        .btn {
            padding: 18px 40px; background: #f2c94c; color: #000;
            text-decoration: none; font-weight: 800; text-transform: uppercase;
            display: inline-block; transition: 0.3s;
        }
        .btn:hover { background: #fff; transform: translateY(-3px); }
    </style>
</head>
<body>
    <section class="hero">
        <div class="content">
            <h1>KIM<span>promebel</span></h1>
            <p>Конструкторская документация для производства мебели. Проекты кухонь и шкафов за 2-3 дня.</p>
            <a href="https://t.me/kimpromebel_pro" class="btn">Обсудить проект</a>
        </div>
    </section>
</body>
</html>
