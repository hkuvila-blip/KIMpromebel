<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KIMPROMEBEL | Exclusive Design</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #f2c94c;
            --dark: #0d0d0f;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            height: 100%; width: 100%; 
            background: var(--dark); 
            font-family: 'Montserrat', sans-serif; 
            color: white; 
            overflow: hidden;
        }

        .hero {
            height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            position: relative;
            padding: 0 8%;
        }

        .hero-bg {
            position: absolute;
            top: 0; right: 0;
            width: 80%;
            height: 100%;
            background-image: url('https://github.com/user-attachments/assets/7162f987-ebc5-4a1c-808b-ffa029dc14d5');
            background-size: cover;
            background-position: center;
            z-index: 1;
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, 
                rgba(13, 13, 15, 0.98) 15%, 
                rgba(13, 13, 15, 0.6) 50%, 
                rgba(13, 13, 15, 0.2) 100%
            );
            backdrop-filter: blur(1px);
            z-index: 2;
        }

        /* --- ИСПРАВЛЕННЫЙ БЛОК КОНТЕНТА ДЛЯ ДЕСКТОПА --- */
        .content { 
            position: relative; 
            z-index: 10; 
            max-width: 900px;
            animation: fadeInUp 1s ease-out forwards; 
            /* Больше нет абсолютного позиционирования здесь */
        }

        h1 {
            font-size: clamp(38px, 7vw, 90px); /* Уменьшил максимальный размер */
            font-weight: 200;
            line-height: 1;
            text-transform: uppercase;
            margin-bottom: 25px;
        }

        h1 b { font-weight: 900; display: block; }
        h1 span { color: var(--gold); }

        .description {
            font-size: clamp(16px, 1.8vw, 20px);
            font-weight: 400;
            line-height: 1.6;
            color: rgba(255,255,255,0.85);
            max-width: 500px;
            margin-bottom: 40px;
            border-left: 3px solid var(--gold);
            padding-left: 20px;
        }

        .btn {
            padding: 20px 50px;
            border: 1px solid var(--gold);
            color: white;
            text-decoration: none;
            text-transform: uppercase;
            font-weight: 700;
            font-size: 13px;
            letter-spacing: 2px;
            transition: 0.3s;
            background: rgba(242, 201, 76, 0.1);
            display: inline-block;
        }

        .btn:hover { background: var(--gold); color: black; }

        /* --- ЭТАПЫ (ПОДВАЛ) - ИСПРАВЛЕНО ДЛЯ ДЕСКТОПА --- */
        .steps-bar {
            position: absolute;
            bottom: 50px; /* Прижато к низу на десктопе */
            left: 50%;
            transform: translateX(-50%); /* Центрирование относительно окна */
            display: flex;
            justify-content: center;
            gap: 60px;
            z-index: 20;
            width: 100%;
            padding: 0 20px;
            animation: fadeInUp 1.3s ease-out forwards;
        }

        .step-item { display: flex; align-items: center; gap: 15px; }
        .dot-marker { 
            width: 10px; height: 10px; 
            background-color: var(--gold); 
            border-radius: 50%; 
            box-shadow: 0 0 10px var(--gold);
        }
        
        .step-text { 
            font-size: 16px; 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            color: #fff;
            white-space: nowrap;
        }

        /* ТЕЛЕФОН И ЛОГО (ДЕСКТОП) */
        header { position: absolute; top: 35px; left: 8%; z-index: 100; }
        .logo { font-weight: 900; font-size: 22px; letter-spacing: 1px; }
        .logo span { color: var(--gold); }

        .phone-block {
            position: absolute;
            top: 35px; right: 8%;
            z-index: 100;
            display: flex; align-items: center; gap: 12px;
            text-decoration: none; color: white;
        }

        .phone-icon {
            width: 44px; height: 44px;
            border: 2px solid var(--gold);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: var(--gold);
            background: rgba(13, 13, 15, 0.6);
            box-shadow: 0 0 15px rgba(242, 201, 76, 0.3);
        }

        /* --- АДАПТИВНОСТЬ ДЛЯ ПЛАНШЕТОВ --- */
        @media (max-width: 1024px) {
            .hero { padding: 0 5%; }
            .top-nav { left: 5%; right: 5%; }
            .phone-number { display: none; }
            
            .steps-bar { gap: 30px; bottom: 30px; }
            .step-text { font-size: 14px; }
        }

        /* --- АДАПТИВНОСТЬ ДЛЯ СМАРТФОНОВ --- */
        @media (max-width: 768px) {
            .hero { padding: 130px 6% 40px; align-items: flex-start; height: auto; min-height: 100vh; }
            .content { display: flex; flex-direction: column; align-items: center; text-align: center; }
            .description { border-left: none; padding-left: 0; margin: 0 auto 35px; }
            .logo { font-size: 19px; }
            
            h1 { font-size: 38px; margin-bottom: 20px; }
            .description { font-size: 16px; margin-bottom: 30px; line-height: 1.4; }
            .btn { width: 100%; max-width: 300px; }
            
            /* На смартфоне этапы переносим под кнопку в обычный поток */
            .steps-bar { 
                position: relative; 
                bottom: auto; left: auto; transform: none;
                margin-top: 50px; 
                flex-direction: column; 
                align-items: center; 
                gap: 20px; 
            }
            .step-text { font-size: 16px; white-space: normal; text-align: center; }
        }
    </style>
</head>
<body>

    <nav class="top-nav">
        <header>
            <div class="logo">KIM<span>PRO</span>MEBEL</div>
        </header>

        <a href="tel:+380675867998" class="phone-block">
            <div class="phone-number">(+38) 067 586 79 98</div>
            <div class="phone-icon">
                <svg viewBox="0 0 24 24"><path fill="currentColor" d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
            </div>
        </a>
    </nav>

    <section class="hero">
        <div class="hero-bg"></div>
        <div class="overlay"></div>
        
        <div class="content">
            <h1>Эксклюзивные <b>КУХНИ</b> <span>PRO</span> уровня</h1>
            <div class="description">
                Индивидуальное проектирование и деталировка. 
                Создаем техническую базу для безупречного производства.
            </div>
            
            <a href="https://t.me/mihailkuvila" target="_blank" class="btn">Заказать проект</a>
        </div>

        <div class="steps-bar">
            <div class="step-item"><div class="dot-marker"></div><span class="step-text">создаем 3д проект</span></div>
            <div class="step-item"><div class="dot-marker"></div><span class="step-text">готовим тех. часть</span></div>
            <div class="step-item"><div class="dot-marker"></div><span class="step-text">отправляем в цех</span></div>
        </div>
    </section>

</body>
</html>
