<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KIMPROMEBEL | Exclusive Design</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #f2c94c;
            --dark: #0d0d0f;
            /* Слева оставляем плотность для читаемости текста */
            --bordeaux-deep: rgba(30, 2, 18, 0.65); 
            /* Справа — полная прозрачность (на 20% светлее предыдущего) */
            --bordeaux-light: rgba(30, 2, 18, 0);
            
            /* ЭФФЕКТЫ ГЛЯНЦА */
            --gloss-bright: rgba(255, 255, 255, 0.18); /* Основной блик */
            --gloss-sharp: rgba(255, 255, 255, 0.1);  /* Острый отблеск */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { 
            height: 100%; width: 100%; 
            background: var(--dark); 
            font-family: 'Montserrat', sans-serif; 
            color: white; 
            overflow-x: hidden;
        }

        .hero {
            min-height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            position: relative;
            padding: 0 8%;
        }

        /* ФОН КУХНИ — Максимальная четкость */
        .hero-bg {
            position: absolute;
            top: 0; right: 0;
            width: 90%; height: 100%;
            background-image: url('https://github.com/user-attachments/assets/7162f987-ebc5-4a1c-808b-ffa029dc14d5');
            background-size: cover; background-position: center;
            z-index: 1;
            opacity: 0.55; 
        }

        /* УЛЬТРА-ГЛЯНЦЕВЫЙ ГРАДИЕНТ */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                /* Острый глянцевый блик */
                linear-gradient(125deg, transparent 40%, var(--gloss-sharp) 45%, var(--gloss-bright) 48%, transparent 52%),
                /* Мягкое свечение */
                radial-gradient(circle at 80% 20%, rgba(255, 255, 255, 0.15) 0%, transparent 50%),
                /* Бордовый фильтр (максимально смещен влево) */
                linear-gradient(90deg, 
                    var(--bordeaux-deep) 0%,     
                    var(--bordeaux-deep) 5%,    /* Глухая тень только в самом начале */
                    rgba(30, 2, 18, 0.4) 25%,    
                    rgba(30, 2, 18, 0.1) 50%,  
                    var(--bordeaux-light) 80%    /* Полное осветление правой части */
                );
            z-index: 2;
        }

        .content { 
            position: relative; 
            z-index: 10; 
            max-width: 850px; 
            display: flex;
            flex-direction: column;
            gap: 25px; 
        }

        /* Отражение под текстом */
        .content::after {
            content: "";
            position: absolute;
            bottom: -40px;
            left: 0; width: 100%; height: 50%;
            transform: scaleY(-1);
            opacity: 0.12;
            filter: blur(10px);
            background: linear-gradient(0deg, #fff 5%, transparent 100%);
            -webkit-mask-image: linear-gradient(transparent 20%, black 90%);
        }

        h1 {
            font-size: clamp(32px, 6vw, 85px);
            font-weight: 200; line-height: 1.1;
            text-transform: uppercase;
            text-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        h1 b { font-weight: 900; display: block; }
        h1 span { color: var(--gold); }

        .description {
            font-size: clamp(15px, 1.5vw, 19px);
            font-weight: 400; line-height: 1.6;
            color: rgba(255,255,255,0.95);
            max-width: 500px;
            border-left: 3px solid var(--gold); padding-left: 20px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .btn {
            padding: 18px 45px;
            border: 1px solid var(--gold);
            color: white; text-decoration: none;
            text-transform: uppercase; font-weight: 700;
            font-size: 13px; letter-spacing: 2px;
            background: rgba(242, 201, 76, 0.25);
            display: inline-block; transition: 0.3s;
            align-self: flex-start;
            box-shadow: 0 0 30px rgba(242, 201, 76, 0.2);
            backdrop-filter: blur(4px);
        }
        .btn:hover { background: var(--gold); color: black; box-shadow: 0 0 50px rgba(242, 201, 76, 0.6); }

        .top-nav {
            position: absolute; top: 30px; left: 8%; right: 8%;
            display: flex; justify-content: space-between; align-items: center; z-index: 100;
        }
        .logo { font-weight: 900; font-size: 22px; text-shadow: 0 5px 15px rgba(0,0,0,0.7); }
        .logo span { color: var(--gold); }

        .phone-block { 
            display: flex; align-items: center; gap: 12px; text-decoration: none; color: white; 
            background: rgba(0,0,0,0.2); padding: 5px 15px; border-radius: 30px; backdrop-filter: blur(5px);
        }
        .phone-icon {
            width: 35px; height: 35px; border: 1.5px solid var(--gold); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; color: var(--gold);
        }

        .footer-steps { display: flex; z-index: 50; }

        @media (min-width: 1025px) {
            .footer-steps {
                position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
                flex-direction: row; justify-content: center; gap: 60px; width: 100%;
            }
        }

        .step { display: flex; align-items: center; gap: 10px; }
        .dot { 
            width: 8px; height: 8px; background: var(--gold); border-radius: 50%; 
            box-shadow: 0 0 10px var(--gold); flex-shrink: 0;
        }
        .step span { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; }

        @media (max-width: 1024px) {
            .hero { padding: 100px 5% 50px; justify-content: center; align-items: center; }
            .overlay {
                background: 
                    linear-gradient(135deg, var(--gloss-sharp), transparent),
                    linear-gradient(180deg, var(--bordeaux-deep) 0%, rgba(30, 2, 18, 0.2) 60%, transparent 100%);
            }
            .content::after { display: none; }
            .content { align-items: center; text-align: center; width: 100%; gap: 20px; }
            .description { border-left: none; padding-left: 0; margin: 0 auto; }
            .btn { align-self: center; }
            .phone-number { display: none; }
            .footer-steps { position: relative; margin-top: 25px; flex-direction: column; gap: 15px; }
            .step { justify-content: center; }
            h1 { font-size: clamp(28px, 8vw, 48px); }
        }
    </style>
</head>
<body>

    <nav class="top-nav">
        <div class="logo">KIM<span>PRO</span>MEBEL</div>
        <a href="tel:+380675867998" class="phone-block">
            <div class="phone-number">(+38) 067 586 79 98</div>
            <div class="phone-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
            </div>
        </a>
    </nav>

    <section class="hero">
        <div class="hero-bg"></div>
        <div class="overlay"></div>
        
        <div class="content">
            <h1>Эксклюзивные <b>КУХНИ</b> <span>PRO</span> уровня</h1>
            <div class="description">
                Индивидуальное проектирование и деталировка. 
                Создаем техническую базу для безупречного производства.
            </div>
            <a href="https://t.me/mihailkuvila" target="_blank" class="btn">Заказать проект</a>

            <div class="footer-steps">
                <div class="step"><div class="dot"></div><span>1. Создаём 3д проект</span></div>
                <div class="step"><div class="dot"></div><span>2. Готовим документы</span></div>
                <div class="step"><div class="dot"></div><span>3. Отправляем на производство</span></div>
            </div>
        </div>
    </section>

</body>
</html>
